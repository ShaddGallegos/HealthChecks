---
preflight_admin_user: admin
preflight_container_rootless: true
preflight_sudo_group: wheel
product_repos:
  - name: openshift-base
    description: OpenShift repository
    baseurl: ""
product_prereq_packages:
  - python3
  - python3-venv
  - python3-pip
  - podman
product_required_secrets:
  - admin_password
  - repo_baseurl
  - installer_token
product_required_mounts:
  - /var
  - /opt
  - /var/lib/registry
installer_config_path: /etc/openshift-installer.conf
