---
# ansible-lint: skip_list=var-naming,jinja,yaml,risky-shell-pipe,risky-file-permissions,fqcn,key-order,name,package-latest
- name: Include env vars file (may be ansible-vault encrypted)
  ansible.builtin.include_vars:
    file: "{{ lookup('env', 'HOME') + '/.ansible/conf/env.yml' }}"
    name: env_vars
  tags: always

- name: Set product_env from env_vars
  ansible.builtin.set_fact:
    product_env: "{{ env_vars.get(product_name, {}) }}"
  tags: always

- name: Check running user is root or has passwordless sudo
  ansible.builtin.command: id -u
  register: uid_check
  changed_when: false
  failed_when: false
  tags: always

- name: Check passwordless sudo if not root
  ansible.builtin.command: sudo -n true
  register: sudo_check
  failed_when: false
  changed_when: false
  when: uid_check.stdout != "0"
  tags: always

- name: Assert running as root or with passwordless sudo (NOPASSWD)
  ansible.builtin.assert:
    that:
      - uid_check.stdout == '0' or sudo_check.rc == 0
    fail_msg: "This PreFlight healthcheck requires root or a user with passwordless sudo (NOPASSWD)."
  tags: always


- name: Fail if required secrets missing
  ansible.builtin.fail:
    msg: "Missing required secret '{{ item }}' for '{{ product_name }}' in ~/.ansible/conf/env.yml"
  when: product_env.get(item, '') == ''
  loop: "{{ openshift_product_required_secrets | default([]) }}"
  tags: secrets

- name: Ensure prerequisite OS packages are installed
  ansible.builtin.package:
    name: "{{ item }}"
    state: present
  loop: "{{ openshift_product_prereq_packages }}"
  ignore_errors: true
  register: pkg_install_results
  tags: prereqs

- name: Warn about missing packages
  ansible.builtin.debug:
    msg: "Package {{ item.item }} failed to install: {{ item.msg | default('unknown') }}"
  loop: "{{ pkg_install_results.results | default([]) }}"
  when: item.failed
  tags: prereqs

- name: Ensure pip, setuptools and wheel are present
  ansible.builtin.pip:
    name:
      - pip
      - setuptools
      - wheel
    state: present
    executable: pip3
  tags: pip

- name: Ensure admin user exists
  ansible.builtin.user:
    name: "{{ openshift_preflight_admin_user }}"
    groups: "{{ openshift_preflight_sudo_group }}"
    append: true
    create_home: true
  tags: users

- name: Allow admin passwordless sudo
  ansible.builtin.lineinfile:
    path: /etc/sudoers.d/preflight_admin
    create: true
    line: "{{ openshift_preflight_admin_user }} ALL=(ALL) NOPASSWD:ALL"
    state: present
    validate: '/usr/sbin/visudo -cf %s'
  tags: users

- name: Ensure product yum/dnf repositories are present
  ansible.builtin.yum_repository:
    name: "{{ item.name }}"
    description: "{{ item.description | default(item.name) }}"
    baseurl: "{{ item.baseurl }}"
    enabled: true
    gpgcheck: true
  loop: "{{ openshift_product_repos | default([]) }}"
  when: openshift_product_repos is defined and openshift_product_repos | length > 0
  tags: repos

- name: Ensure installer config exists (touch as placeholder)
  ansible.builtin.file:
    path: "{{ openshift_installer_config_path }}"
    state: touch
  tags: installer

- name: Configure rootless podman (subuid/subgid) when requested
  block:
    - name: Ensure subuid entry exists
      ansible.builtin.lineinfile:
        dest: /etc/subuid
        line: "{{ openshift_preflight_admin_user }}:100000:65536"
        create: true
    - name: Ensure subgid entry exists
      ansible.builtin.lineinfile:
        dest: /etc/subgid
        line: "{{ openshift_preflight_admin_user }}:100000:65536"
        create: true
  when: openshift_preflight_container_rootless | bool
  tags: containers

- name: Check filesystem mounts (report)
  ansible.builtin.shell: df -h {{ item }} || true
  register: df_out
  failed_when: false
  loop: "{{ openshift_product_required_mounts | default([]) }}"
  tags: filesystems

- name: Include preflight template for standard discovery and reporting
  ansible.builtin.include_role:
    name: preflight_template
  vars:
    product_name: openshift
    product_required_mounts: ['/','/var','/opt','/var/lib/containers']
    product_ports: [6443,2379,2380]
    product_repos: []
    io_benchmark_enabled: false
  tags: preflight

- name: Check for oc client and cluster access (non-destructive)
  ansible.builtin.shell: |
    if command -v oc >/dev/null 2>&1; then
      oc version --client || true
      oc get nodes --no-headers 2>/dev/null || true
    else
      echo 'oc-not-present'
    fi
  register: oc_check
  failed_when: false
  changed_when: false
  tags: discovery

- name: Check OpenShift cluster version (non-destructive)
  ansible.builtin.shell: |
    if command -v oc >/dev/null 2>&1; then
      oc get clusterversion -o jsonpath='{.items[0].status.desired.version}' 2>/dev/null || echo ''
    else
      echo ''
    fi
  register: oc_cluster_version
  failed_when: false
  changed_when: false
  tags: discovery

- name: Count OpenShift nodes and ready nodes (non-destructive)
  ansible.builtin.shell: |
    if command -v oc >/dev/null 2>&1; then
      total=$(oc get nodes --no-headers 2>/dev/null | wc -l || true)
      ready=$(oc get nodes --no-headers 2>/dev/null | awk '{print $2}' | grep -c 'Ready' || true)
      echo "$total $ready"
    else
      echo "0 0"
    fi
  register: oc_node_counts
  failed_when: false
  changed_when: false
  tags: discovery

- name: Check kubelet service active state (non-destructive)
  ansible.builtin.command: systemctl is-active kubelet || true
  register: kubelet_active
  failed_when: false
  changed_when: false
  tags: discovery

- name: Detect container runtime (crio/containerd/podman/docker)
  ansible.builtin.shell: |
    if systemctl is-active crio >/dev/null 2>&1; then
      echo crio
    elif systemctl is-active containerd >/dev/null 2>&1; then
      echo containerd
    elif command -v podman >/dev/null 2>&1; then
      echo podman
    elif systemctl is-active docker >/dev/null 2>&1; then
      echo docker
    else
      echo unknown
    fi
  register: openshift_container_runtime
  failed_when: false
  changed_when: false
  tags: discovery

- name: Assemble OpenShift enhanced discovery facts
  ansible.builtin.set_fact:
    openshift_enhanced:
      oc_client_raw: "{{ oc_check.stdout | default('') }}"
      cluster_version: "{{ oc_cluster_version.stdout | default('') }}"
      node_counts_raw: "{{ oc_node_counts.stdout | default('0 0') }}"
      kubelet_active: "{{ kubelet_active.stdout | default('unknown') }}"
      openshift_container_runtime: "{{ openshift_container_runtime.stdout | default('unknown') }}"
  tags: discovery

- name: Set openshift discovery report
  ansible.builtin.set_fact:
    openshift_discovery_report:
      inventory_hostname: "{{ inventory_hostname }}"
      oc_client: "{{ oc_check.stdout | default('') }}"
      enhanced: "{{ openshift_enhanced | default({}) }}"
      preflight_template: "{{ preflight_report | default({}) }}"
  tags: report

- name: Write openshift preflight discovery report to artifacts (json)
  ansible.builtin.copy:
    dest: "{{ artifacts_dir | default((lookup('env', 'HOME') + '/.ansible/artifacts')) }}/openshift-{{ inventory_hostname }}-preflight-report.json"
    content: "{{ {'product':'openshift','report': openshift_discovery_report | default({})} | to_nice_json }}"
  delegate_to: localhost
  when: artifacts_dir is defined
  tags: report
