---
# ansible-lint: skip_list=var-naming,jinja,yaml,risky-shell-pipe,risky-file-permissions,fqcn,key-order,name,package-latest
- name: Include env vars file (may be ansible-vault encrypted)
  ansible.builtin.include_vars:
    file: "{{ lookup('env', 'HOME') + '/.ansible/conf/env.yml' }}"
    name: env_vars
  tags: always

- name: Set product_env from env_vars
  ansible.builtin.set_fact:
    product_env: "{{ env_vars.get(product_name, {}) }}"
  tags: always

- name: Check running user is root or has passwordless sudo
  ansible.builtin.command: id -u
  register: uid_check
  changed_when: false
  failed_when: false
  tags: always

- name: Check passwordless sudo if not root
  ansible.builtin.command: sudo -n true
  register: sudo_check
  failed_when: false
  changed_when: false
  when: uid_check.stdout != "0"
  tags: always

- name: Assert running as root or with passwordless sudo (NOPASSWD)
  ansible.builtin.assert:
    that:
      - uid_check.stdout == '0' or sudo_check.rc == 0
    fail_msg: "This PreFlight healthcheck requires root or a user with passwordless sudo (NOPASSWD)."
  tags: always


- name: Fail if required secrets missing
  ansible.builtin.fail:
    msg: "Missing required secret '{{ item }}' for '{{ product_name }}' in ~/.ansible/conf/env.yml"
  when: product_env.get(item, '') == ''
  loop: "{{ rhosp_product_required_secrets | default([]) }}"
  tags: secrets

- name: Ensure prerequisite OS packages are installed
  ansible.builtin.package:
    name: "{{ item }}"
    state: present
  loop: "{{ rhosp_product_prereq_packages }}"
  ignore_errors: true
  register: pkg_install_results
  tags: prereqs

- name: Warn about missing packages
  ansible.builtin.debug:
    msg: "Package {{ item.item }} failed to install: {{ item.msg | default('unknown') }}"
  loop: "{{ pkg_install_results.results | default([]) }}"
  when: item.failed
  tags: prereqs

- name: Ensure pip, setuptools and wheel are present
  ansible.builtin.pip:
    name:
      - pip
      - setuptools
      - wheel
    state: present
    executable: pip3
  tags: pip

- name: Ensure admin user exists
  ansible.builtin.user:
    name: "{{ rhosp_preflight_admin_user }}"
    groups: "{{ rhosp_preflight_sudo_group }}"
    append: true
    create_home: true
  tags: users

- name: Allow admin passwordless sudo
  ansible.builtin.lineinfile:
    path: /etc/sudoers.d/preflight_admin
    create: true
    line: "{{ rhosp_preflight_admin_user }} ALL=(ALL) NOPASSWD:ALL"
    state: present
    validate: '/usr/sbin/visudo -cf %s'
  tags: users

- name: Ensure product yum/dnf repositories are present
  ansible.builtin.yum_repository:
    name: "{{ item.name }}"
    description: "{{ item.description | default(item.name) }}"
    baseurl: "{{ item.baseurl }}"
    enabled: true
    gpgcheck: true
  loop: "{{ rhosp_product_repos | default([]) }}"
  when: rhosp_product_repos is defined and rhosp_product_repos | length > 0
  tags: repos

- name: Ensure installer config exists (touch as placeholder)
  ansible.builtin.file:
    path: "{{ rhosp_installer_config_path }}"
    state: touch
  tags: installer

- name: Include preflight template for standard discovery and system checks
  ansible.builtin.include_role:
    name: preflight_template
  vars:
    product_name: rhosp
    product_required_mounts: ['/','/var','/var/lib/openstack']
    product_ports: []
    product_repos: []
    io_benchmark_enabled: false
  tags: preflight

- name: Check for OpenStack packages (non-destructive)
  ansible.builtin.shell: rpm -qa | egrep -i 'openstack|nova|neutron|glance|cinder' || true
  register: openstack_pkgs
  failed_when: false
  changed_when: false
  tags: discovery

- name: Set list of RHOSP systemd services to check
  ansible.builtin.set_fact:
    rhosp_units:
      - openstack-keystone
      - openstack-nova-api
      - openstack-nova-compute
      - openstack-glance-api
      - openstack-neutron-server
      - openstack-cinder-volume
      - rabbitmq-server
      - mariadb
      - httpd
      - memcached
      - redis
  tags: discovery

- name: Check RHOSP service active state (non-fatal)
  ansible.builtin.shell: systemctl is-active {{ item }} || true
  register: rhosp_services_active
  failed_when: false
  changed_when: false
  loop: "{{ rhosp_units }}"
  tags: discovery

- name: Check RHOSP service enabled state (non-fatal)
  ansible.builtin.shell: systemctl is-enabled {{ item }} || true
  register: rhosp_services_enabled
  failed_when: false
  changed_when: false
  loop: "{{ rhosp_units }}"
  tags: discovery

- name: Check OpenStack client presence
  ansible.builtin.shell: openstack --version || true
  register: openstack_cli
  failed_when: false
  changed_when: false
  tags: discovery

- name: Check RabbitMQ status if rabbitmqctl present
  ansible.builtin.command: rabbitmqctl status
  register: rabbitmq_status
  failed_when: false
  changed_when: false
  tags: discovery

- name: Assemble RHOSP enhanced discovery facts
  ansible.builtin.set_fact:
    rhosp_enhanced:
      services_active: "{{ rhosp_services_active.results | map(attribute='stdout') | list }}"
      services_enabled: "{{ rhosp_services_enabled.results | map(attribute='stdout') | list }}"
      openstack_cli: "{{ openstack_cli.stdout | default('not-installed') }}"
      rabbitmq_status: "{{ rabbitmq_status.stdout | default('not-checked') }}"
  tags: discovery

- name: Check for local MariaDB/MySQL listener (port 3306)
  ansible.builtin.shell: ss -ltnp | grep -E ':3306\b' || true
  register: mariadb_listen
  failed_when: false
  changed_when: false
  tags: discovery

- name: Add mariadb listener info to rhosp_enhanced
  ansible.builtin.set_fact:
    rhosp_enhanced: "{{ rhosp_enhanced | default({}) | combine({'mariadb_listen': mariadb_listen.stdout | default('')}) }}"
  tags: discovery

- name: Set rhosp discovery report
  ansible.builtin.set_fact:
    rhosp_discovery_report:
      inventory_hostname: "{{ inventory_hostname }}"
      packages: "{{ openstack_pkgs.stdout | default('') }}"
      enhanced: "{{ rhosp_enhanced | default({}) }}"
      preflight_template: "{{ preflight_report | default({}) }}"
  tags: report

- name: Archive rhosp discovery report (json)
  ansible.builtin.copy:
    dest: "{{ artifacts_dir | default((lookup('env', 'HOME') + '/.ansible/artifacts')) }}/rhosp-{{ inventory_hostname }}-preflight-report.json"
    content: "{{ {'product':'rhosp','report': rhosp_discovery_report | default({})} | to_nice_json }}"
  delegate_to: localhost
  when: artifacts_dir is defined
  tags: report
