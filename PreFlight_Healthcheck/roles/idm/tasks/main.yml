---
# ansible-lint: skip_list=var-naming,jinja,yaml,risky-shell-pipe,risky-file-permissions,fqcn,key-order,name,package-latest
- name: Include env vars file (may be ansible-vault encrypted)
  ansible.builtin.include_vars:
    file: "{{ lookup('env', 'HOME') + '/.ansible/conf/env.yml' }}"
    name: env_vars
  ignore_errors: true
  tags: always

- name: Assert running as root or with passwordless sudo (NOPASSWD)
  ansible.builtin.command: id -u
  register: uid_check
  changed_when: false
  failed_when: false
  tags: always

- name: Check passwordless sudo if not root
  ansible.builtin.command: sudo -n true
  register: sudo_check
  failed_when: false
  changed_when: false
  when: uid_check.stdout != "0"
  tags: always

- name: Assert running as root or with passwordless sudo
  ansible.builtin.assert:
    that:
      - uid_check.stdout == '0' or sudo_check.rc == 0
    fail_msg: "This PreFlight healthcheck requires root or passwordless sudo (NOPASSWD)."
  tags: always

- name: Assert supported RHEL major version
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] == 'RedHat'
      - ansible_facts['distribution_major_version'] is defined
      - ansible_facts['distribution_major_version'] | string in idm_supported_rhel_major_versions
    fail_msg: "Supported RHEL major versions: {{ idm_supported_rhel_major_versions | join(', ') }}"
  tags: platform

- name: Set IdM required mounts and ports
  ansible.builtin.set_fact:
    product_required_mounts: ['/','/var','/etc/dirsrv']
    product_ports: [389,636,464,88,88]
  tags: discovery

- name: Check if 389/636 are listening
  ansible.builtin.shell: ss -ltnp | egrep -w ':389|:636' || true
  register: idm_sockets
  failed_when: false
  changed_when: false
  tags: network

- name: Check ipa-server status if installed
  ansible.builtin.command: systemctl status ipa.service || true
  register: ipa_status
  failed_when: false
  changed_when: false
  tags: discovery

- name: Check for relevant RPMs
  ansible.builtin.command: rpm -q ipa-server bind-dyndb-ldap || true
  register: idm_rpms
  failed_when: false
  changed_when: false
  tags: discovery

- name: Assemble idm preflight report
  ansible.builtin.set_fact:
    idm_preflight:
      inventory_hostname: "{{ inventory_hostname }}"
      rpm_check: "{{ idm_rpms.stdout | default('') }}"
      service_status: "{{ ipa_status.stdout | default('') }}"
      sockets: "{{ idm_sockets.stdout | default('') }}"
  tags: report

- name: Write IdM preflight artifact
  ansible.builtin.copy:
    dest: "{{ artifacts_dir | default((lookup('env', 'HOME') + '/.ansible/artifacts')) }}/idm-{{ inventory_hostname }}-preflight-report.json"
    content: "{{ idm_preflight | to_nice_json }}"
  delegate_to: localhost
  when: artifacts_dir is defined
  tags: report
