---
# ansible-lint: skip_list=var-naming,jinja,yaml,risky-shell-pipe,risky-file-permissions,fqcn,key-order,name,package-latest
- name: Include env vars file (may be ansible-vault encrypted)
  ansible.builtin.include_vars:
    file: "{{ lookup('env', 'HOME') + '/.ansible/conf/env.yml' }}"
    name: env_vars
  ignore_errors: true
  tags: always

- name: Assert running as root or passwordless sudo
  ansible.builtin.command: id -u
  register: uid_check
  changed_when: false
  failed_when: false
  tags: always

- name: Check for gitea service or container
  ansible.builtin.shell: ss -ltnp | egrep -w ':3000' || true
  register: gitea_socket
  failed_when: false
  changed_when: false
  tags: discovery

- name: Check for gitea RPM or binary
  ansible.builtin.command: rpm -q gitea || true
  register: gitea_rpm
  failed_when: false
  changed_when: false
  tags: discovery

- name: Write gitea preflight artifact
  ansible.builtin.copy:
    dest: "{{ artifacts_dir | default((lookup('env', 'HOME') + '/.ansible/artifacts')) }}/gitea-{{ inventory_hostname }}-preflight-report.json"
    content: "{{ {'socket': gitea_socket.stdout, 'rpm': gitea_rpm.stdout} | to_nice_json }}"
  delegate_to: localhost
  when: artifacts_dir is defined
  tags: report
