---
# noqa
# ansible-lint: skip_list=var-naming,jinja,yaml,risky-shell-pipe,risky-file-permissions,fqcn,key-order,name,package-latest
- name: Include env vars file (may be ansible-vault encrypted)
  ansible.builtin.include_vars:
    file: "{{ lookup('env', 'HOME') + '/.ansible/conf/env.yml' }}"
    name: env_vars
  tags: always

- name: Set product_env from env_vars
  ansible.builtin.set_fact:
    product_env: "{{ env_vars.get(product_name, {}) }}"
  tags: always

- name: Check running user is root or has passwordless sudo
  ansible.builtin.command: id -u
  register: uid_check
  changed_when: false
  failed_when: false
  tags: always

- name: Check passwordless sudo if not root
  ansible.builtin.command: sudo -n true
  register: sudo_check
  failed_when: false
  changed_when: false
  when: uid_check.stdout != "0"
  tags: always

- name: Assert running as root or with passwordless sudo (NOPASSWD)
  ansible.builtin.assert:
    that:
      - uid_check.stdout == '0' or sudo_check.rc == 0
    fail_msg: "This PreFlight healthcheck requires root or a user with passwordless sudo (NOPASSWD)."
  tags: always


- name: Fail if required secrets missing
  ansible.builtin.fail:
    msg: "Missing required secret '{{ secret_key }}' for '{{ product_name }}' in ~/.ansible/conf/env.yml"
  when: product_env.get(secret_key, '') == ''
  loop: "{{ rhel_product_required_secrets | default([]) }}"
  loop_control:
    loop_var: secret_key
  tags: secrets

- name: Ensure prerequisite OS packages are installed
  block:
    - name: Check for missing prerequisite packages (non-destructive)
      ansible.builtin.shell: |
        if ! rpm -q {{ prereq_pkg }} >/dev/null 2>&1; then
          echo {{ prereq_pkg }}
        fi
      register: pkg_check_results
      failed_when: false
      changed_when: false
      loop: "{{ rhel_product_prereq_packages }}"
      loop_control:
        loop_var: prereq_pkg
      tags: prereqs

    - name: Set missing product prereq packages fact
      ansible.builtin.set_fact:
        missing_product_prereq_packages: "{{ pkg_check_results.results | map(attribute='stdout') | reject('equalto', '') | list }}"
      tags: prereqs

    - name: Install missing prerequisite packages (opt-in)
      ansible.builtin.package:
        name: "{{ missing_product_prereq_packages }}"
        state: present
      when: (rhel_install_deps | default(false)) and (missing_product_prereq_packages | default([]) | length > 0)
      register: pkg_install_results
      tags: prereqs

- name: Warn about missing packages
  ansible.builtin.debug:
    msg: "Package {{ pkg_result.item }} failed to install: {{ pkg_result.msg | default('unknown') }}"
  loop: "{{ pkg_install_results.results | default([]) }}"
  loop_control:
    loop_var: pkg_result
  when: pkg_result.failed
  tags: prereqs

- name: Ensure pip, setuptools and wheel are present
  ansible.builtin.pip:
    name:
      - pip
      - setuptools
      - wheel
    state: present
    executable: pip3
  when: rhel_install_deps | default(false)
  tags: pip

- name: Ensure admin user exists
  ansible.builtin.user:
    name: "{{ rhel_preflight_admin_user }}"
    groups: "{{ rhel_preflight_sudo_group }}"
    append: true
    create_home: true
  when: rhel_apply_changes | default(false)
  tags: users

- name: Allow admin passwordless sudo
  ansible.builtin.lineinfile:
    path: /etc/sudoers.d/preflight_admin
    create: true
    line: "{{ rhel_preflight_admin_user }} ALL=(ALL) NOPASSWD:ALL"
    state: present
    validate: '/usr/sbin/visudo -cf %s'
  when: rhel_apply_changes | default(false)
  tags: users

- name: Ensure product yum/dnf repositories are present
  ansible.builtin.yum_repository:
    name: "{{ repo_item.name }}"
    description: "{{ repo_item.description | default(repo_item.name) }}"
    baseurl: "{{ repo_item.baseurl }}"
    enabled: true
    gpgcheck: true
  loop: "{{ rhel_product_repos | default([]) }}"
  loop_control:
    loop_var: repo_item
  when: (rhel_product_repos is defined and rhel_product_repos | length > 0) and (rhel_apply_changes | default(false))
  tags: repos

- name: Ensure installer config exists (touch as placeholder)
  ansible.builtin.file:
    path: "{{ rhel_installer_config_path }}"
    state: touch
  when: rhel_apply_changes | default(false)
  tags: installer

- name: Configure rootless podman (subuid/subgid) when requested
  block:
    - name: Ensure subuid entry exists
      ansible.builtin.lineinfile:
        dest: /etc/subuid
        line: "{{ rhel_preflight_admin_user }}:100000:65536"
        create: true
    - name: Ensure subgid entry exists
      ansible.builtin.lineinfile:
        dest: /etc/subgid
        line: "{{ rhel_preflight_admin_user }}:100000:65536"
        create: true
  when: rhel_preflight_container_rootless | bool and rhel_apply_changes | default(false)
  tags: containers

- name: Check filesystem mounts (report)
  ansible.builtin.shell: df -h {{ mount_point }} || true
  register: df_out
  failed_when: false
  loop: "{{ rhel_product_required_mounts | default([]) }}"
  loop_control:
    loop_var: mount_point
  tags: filesystems

- name: Include preflight template for standard discovery
  ansible.builtin.include_role:
    name: preflight_template
  vars:
    product_name: rhel
    product_required_mounts: ['/','/var']
    product_ports: []
    product_repos: []
    io_benchmark_enabled: false
  tags: preflight

- name: Set rhel discovery report
  ansible.builtin.set_fact:
    rhel_discovery_report:
      inventory_hostname: "{{ inventory_hostname }}"
      subscription: "{{ subscription_check.stdout | default('') }}"
      insights: "{{ insights_check.stdout | default('') }}"
      rhc: "{{ rhc_check.stdout | default('') }}"
      preflight_template: "{{ preflight_report | default({}) }}"
  tags: report

- name: Write rhel preflight discovery report to artifacts (json)
  ansible.builtin.copy:
    dest: "{{ artifacts_dir | default((lookup('env', 'HOME') + '/.ansible/artifacts')) }}/rhel-{{ inventory_hostname }}-preflight-report.json"
    content: "{{ {'product':'rhel','report': rhel_discovery_report | default({})} | to_nice_json }}"
  delegate_to: localhost
  when: artifacts_dir is defined
  tags: report

- name: Check subscription-manager identity/status (RHEL)
  ansible.builtin.shell: |
    if command -v subscription-manager >/dev/null 2>&1; then
      subscription-manager identity || true
      subscription-manager status || true
    else
      echo 'subscription-manager-not-present'
    fi
  register: subscription_check
  changed_when: false
  failed_when: false
  tags: rhel

- name: Check insights-client presence/status (RHEL)
  ansible.builtin.shell: |
    if command -v insights-client >/dev/null 2>&1; then
      insights-client --status || true
    else
      echo 'insights-client-not-installed'
    fi
  register: insights_check
  changed_when: false
  failed_when: false
  tags: rhel

- name: Check for rhc binary
  ansible.builtin.shell: |
    if command -v rhc >/dev/null 2>&1; then
      rhc --version || true
    else
      echo 'rhc-not-installed'
    fi
  register: rhc_check
  changed_when: false
  failed_when: false
  tags: rhel
