---
# ansible-lint: skip_list=var-naming,jinja,yaml,risky-shell-pipe,risky-file-permissions,fqcn,key-order,name,package-latest
- name: Include env vars file (may be ansible-vault encrypted)
  ansible.builtin.include_vars:
    file: "{{ lookup('env', 'HOME') + '/.ansible/conf/env.yml' }}"
    name: env_vars
  tags: always

- name: Set product_env from env_vars
  ansible.builtin.set_fact:
    product_env: "{{ env_vars.get(product_name, {}) }}"
  tags: always

- name: Check running user is root or has passwordless sudo
  ansible.builtin.command: id -u
  register: uid_check
  changed_when: false
  failed_when: false
  tags: always

- name: Check passwordless sudo if not root
  ansible.builtin.command: sudo -n true
  register: sudo_check
  failed_when: false
  changed_when: false
  when: uid_check.stdout != "0"
  tags: always

- name: Assert running as root or with passwordless sudo (NOPASSWD)
  ansible.builtin.assert:
    that:
      - uid_check.stdout == '0' or sudo_check.rc == 0
    fail_msg: "This PreFlight healthcheck requires root or a user with passwordless sudo (NOPASSWD)."
  tags: always

- name: Assert supported RHEL major version
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] == 'RedHat'
      - ansible_facts['distribution_major_version'] is defined
      - ansible_facts['distribution_major_version'] | string in insights_supported_rhel_major_versions
    fail_msg: "This role supports RHEL major versions: {{ insights_supported_rhel_major_versions | join(', ') }}"
  tags: platform

- name: Include preflight template
  ansible.builtin.include_role:
    name: preflight_template
  vars:
      product_name: insights
      product_required_mounts: ['/','/var']
      product_ports: []
      product_repos: []
      io_benchmark_enabled: false
  tags: preflight

- name: Check for installed Insights client package
  ansible.builtin.shell: rpm -qa | egrep -i 'insights|insights-client' || true
  register: insights_pkg
  failed_when: false
  changed_when: false
  tags: discovery

- name: Check for insights client executable
  ansible.builtin.shell: command -v insights-client || true
  register: insights_cmd
  failed_when: false
  changed_when: false
  tags: discovery

- name: Check for insights config files
  ansible.builtin.shell: ls /etc/insights* /etc/insights-client* 2>/dev/null || true
  register: insights_conf
  failed_when: false
  changed_when: false
  tags: discovery

- name: Check for running insights-related services
  ansible.builtin.shell: systemctl list-units --type=service --state=running | egrep -i 'insights|insights-client|rhc' || true
  register: insights_service
  failed_when: false
  changed_when: false
  tags: discovery

- name: Combine Insights checks into `preflight_report`
  ansible.builtin.set_fact:
    preflight_report: "{{ preflight_report | default({}) | combine({'product': 'insights', 'insights': { 'packages': insights_pkg.stdout | default(''), 'cmd': insights_cmd.stdout | default(''), 'conf': insights_conf.stdout | default(''), 'services': insights_service.stdout | default('') }}) }}"
  tags: report

- name: Write insights preflight discovery report to artifacts (json)
  ansible.builtin.copy:
    dest: "{{ artifacts_dir | default((lookup('env', 'HOME') + '/.ansible/artifacts')) }}/insights-{{ inventory_hostname }}-preflight-report.json"
    content: "{{ preflight_report | default({}) | to_nice_json }}"
  delegate_to: localhost
  when: artifacts_dir is defined
  tags: report
