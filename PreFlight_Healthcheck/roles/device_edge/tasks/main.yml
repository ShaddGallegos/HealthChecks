---
# ansible-lint: skip_list=var-naming,jinja,yaml,risky-shell-pipe,risky-file-permissions,fqcn,key-order,name,package-latest
- name: Include env vars file (may be ansible-vault encrypted)
  ansible.builtin.include_vars:
    file: "{{ lookup('env', 'HOME') + '/.ansible/conf/env.yml' }}"
    name: env_vars
  tags: always

- name: Set product_env from env_vars
  ansible.builtin.set_fact:
    product_env: "{{ env_vars.get(product_name, {}) }}"
  tags: always

- name: Check running user is root or has passwordless sudo
  ansible.builtin.command: id -u
  register: uid_check
  changed_when: false
  failed_when: false
  tags: always

- name: Check passwordless sudo if not root
  ansible.builtin.command: sudo -n true
  register: sudo_check
  failed_when: false
  changed_when: false
  when: uid_check.stdout != "0"
  tags: always

- name: Assert running as root or with passwordless sudo (NOPASSWD)
  ansible.builtin.assert:
    that:
      - uid_check.stdout == '0' or sudo_check.rc == 0
    fail_msg: "This PreFlight healthcheck requires root or a user with passwordless sudo (NOPASSWD)."
  tags: always

- name: Assert supported RHEL major version
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] == 'RedHat'
      - ansible_facts['distribution_major_version'] is defined
      - ansible_facts['distribution_major_version'] | string in device_edge_supported_rhel_major_versions
    fail_msg: "This role supports RHEL major versions: {{ device_edge_supported_rhel_major_versions | join(', ') }}"
  tags: platform

- name: Include preflight template
  ansible.builtin.include_role:
    name: preflight_template
  vars:
      product_name: device_edge
      product_required_mounts: ['/','/var/lib/edge']
      product_ports: [22,443,8080]
      product_repos: []
      io_benchmark_enabled: false
  tags: preflight

- name: Check podman availability/version (non-destructive)
  ansible.builtin.command: podman --version
  register: podman_ver
  failed_when: false
  changed_when: false
  tags: discovery

- name: Check registry.redhat.io reachability (HEAD) (non-destructive)
  ansible.builtin.uri:
    url: https://registry.redhat.io/
    method: HEAD
    return_content: no
    status_code: 200,301,302
    timeout: 5
  register: registry_rh
  failed_when: false
  changed_when: false
  tags: network

- name: Set device_edge discovery report
  ansible.builtin.set_fact:
    device_edge_discovery_report:
      inventory_hostname: "{{ inventory_hostname }}"
      podman: "{{ podman_ver.stdout | default('') }}"
      registry_reachable: "{{ registry_rh.status | default('unknown') }}"
      preflight_template: "{{ preflight_report | default({}) }}"
  tags: report

- name: Archive device_edge discovery report (json)
  ansible.builtin.copy:
    dest: "{{ artifacts_dir | default((lookup('env', 'HOME') + '/.ansible/artifacts')) }}/device_edge-{{ inventory_hostname }}-preflight-report.json"
    content: "{{ {'product':'device_edge','report': device_edge_discovery_report | default({})} | to_nice_json }}"
  delegate_to: localhost
  when: artifacts_dir is defined
  tags: report


