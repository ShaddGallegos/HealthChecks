---
# ansible-lint: skip_list=var-naming,jinja,yaml,risky-shell-pipe,risky-file-permissions,fqcn,key-order,name,package-latest
- name: Include env vars file (may be ansible-vault encrypted)
  ansible.builtin.include_vars:
    file: "{{ lookup('env', 'HOME') + '/.ansible/conf/env.yml' }}"
    name: env_vars
  tags: always

- name: Set product_env from env_vars
  ansible.builtin.set_fact:
    product_env: "{{ env_vars.get(product_name, {}) }}"
  tags: always

- name: Check running user is root or has passwordless sudo
  ansible.builtin.command: id -u
  register: uid_check
  changed_when: false
  failed_when: false
  tags: always

- name: Check passwordless sudo if not root
  ansible.builtin.command: sudo -n true
  register: sudo_check
  failed_when: false
  changed_when: false
  when: uid_check.stdout != "0"
  tags: always

- name: Assert running as root or with passwordless sudo (NOPASSWD)
  ansible.builtin.assert:
    that:
      - uid_check.stdout == '0' or sudo_check.rc == 0
    fail_msg: "This PreFlight healthcheck requires root or a user with passwordless sudo (NOPASSWD)."
  tags: always

- name: Assert supported RHEL major version
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] == 'RedHat'
      - ansible_facts['distribution_major_version'] is defined
      - ansible_facts['distribution_major_version'] | string in directory_server_supported_rhel_major_versions
    fail_msg: "This role supports RHEL major versions: {{ directory_server_supported_rhel_major_versions | join(', ') }}"
  tags: platform

- name: Include preflight template
  ansible.builtin.include_role:
    name: preflight_template
  vars:
      product_name: directory_server
      product_required_mounts: ['/','/var','/etc/dirsrv']
      product_ports: [389,636]
      product_repos: []
      io_benchmark_enabled: false
  tags: preflight

- name: Discovery placeholder - directory_server
  ansible.builtin.debug:
    msg: "Discovery checks for directory_server not yet implemented."
  tags: discovery

- name: Check for installed Red Hat Directory Server packages
  ansible.builtin.shell: rpm -qa | egrep -i 'dirsrv|389-ds|redhat-ds' || true
  register: ds_pkg
  failed_when: false
  changed_when: false
  tags: discovery

- name: Check for Directory Server configuration directories
  ansible.builtin.shell: ls -d /etc/dirsrv/* || true
  register: ds_config
  failed_when: false
  changed_when: false
  tags: discovery

- name: Check for NSS DB / cert files under /etc/dirsrv
  ansible.builtin.shell: ls /etc/dirsrv/*/cert* /etc/dirsrv/*/nss* 2>/dev/null || true
  register: ds_nss
  failed_when: false
  changed_when: false
  tags: discovery

- name: Check for running Directory Server related services
  ansible.builtin.shell: systemctl list-units --type=service --state=running | egrep -i 'dirsrv|slapd|389' || true
  register: ds_service
  failed_when: false
  changed_when: false
  tags: discovery

- name: Search Directory Server config for replication hints
  ansible.builtin.shell: grep -R -i 'replica\|repl\|replication' /etc/dirsrv/ 2>/dev/null || true
  register: ds_replication
  failed_when: false
  changed_when: false
  tags: discovery

- name: Combine Directory Server checks into `preflight_report`
  ansible.builtin.set_fact:
    preflight_report: "{{ preflight_report | default({}) | combine({'product': 'directory_server', 'directory_server': { 'packages': ds_pkg.stdout | default(''), 'config_dirs': ds_config.stdout | default(''), 'nssdb': ds_nss.stdout | default(''), 'services': ds_service.stdout | default(''), 'replication': ds_replication.stdout | default('') }}) }}"
  tags: report

- name: Write directory_server preflight discovery report to artifacts (json)
  ansible.builtin.copy:
    dest: "{{ artifacts_dir | default((lookup('env', 'HOME') + '/.ansible/artifacts')) }}/directory_server-{{ inventory_hostname }}-preflight-report.json"
    content: "{{ preflight_report | default({}) | to_nice_json }}"
  delegate_to: localhost
  when: artifacts_dir is defined
  tags: report
