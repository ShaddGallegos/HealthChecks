---
# ansible-lint: skip_list=var-naming,jinja,yaml,risky-shell-pipe,risky-file-permissions,fqcn,key-order,name,package-latest
# Preflight checks for OpenShift Local (CRC/OKD local)
- name: Include env vars file (may be ansible-vault encrypted)
  ansible.builtin.include_vars:
    file: "{{ lookup('env', 'HOME') + '/.ansible/conf/env.yml' }}"
    name: env_vars
  ignore_errors: true
  tags: always

- name: Check for podman or docker
  ansible.builtin.command: which podman || which docker || true
  register: container_bin
  changed_when: false
  failed_when: false
  tags: discovery

- name: Check disk and CPU resources
  ansible.builtin.shell: |
    echo "cpus=$(nproc)"; echo "mem_mb=$(free -m | awk '/Mem:/ {print $2}')"
  register: hwinfo
  changed_when: false
  failed_when: false
  tags: discovery

- name: Write openshift_local preflight artifact
  ansible.builtin.copy:
    dest: "{{ artifacts_dir | default((lookup('env', 'HOME') + '/.ansible/artifacts')) }}/openshift_local-{{ inventory_hostname }}-preflight-report.json"
    content: "{{ {'container_bin': container_bin.stdout | default(''), 'hw': hwinfo.stdout | default('')} | to_nice_json }}"
  delegate_to: localhost
  when: artifacts_dir is defined
  tags: report
