---
# ansible-lint: skip_list=var-naming,jinja,yaml,risky-shell-pipe,risky-file-permissions,fqcn,key-order,name,package-latest
- name: Include env vars file (may be ansible-vault encrypted)
  ansible.builtin.include_vars:
    file: "{{ lookup('env', 'HOME') + '/.ansible/conf/env.yml' }}"
    name: env_vars
  tags: always

- name: Set product_env from env_vars
  ansible.builtin.set_fact:
    product_env: "{{ env_vars.get(product_name, {}) }}"
  tags: always

- name: Check running user is root or has passwordless sudo
  ansible.builtin.command: id -u
  register: uid_check
  changed_when: false
  failed_when: false
  tags: always

- name: Check passwordless sudo if not root
  ansible.builtin.command: sudo -n true
  register: sudo_check
  failed_when: false
  changed_when: false
  when: uid_check.stdout != "0"
  tags: always

- name: Assert running as root or with passwordless sudo (NOPASSWD)
  ansible.builtin.assert:
    that:
      - uid_check.stdout == '0' or sudo_check.rc == 0
    fail_msg: "This PreFlight healthcheck requires root or a user with passwordless sudo (NOPASSWD)."
  tags: always

- name: Assert supported RHEL major version
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] == 'RedHat'
      - ansible_facts['distribution_major_version'] is defined
      - ansible_facts['distribution_major_version'] | string in migration_toolkit_supported_rhel_major_versions
    fail_msg: "This role supports RHEL major versions: {{ migration_toolkit_supported_rhel_major_versions | join(', ') }}"
  tags: platform

- name: Include preflight template
  ansible.builtin.include_role:
    name: preflight_template
  vars:
      product_name: migration_toolkit
      product_required_mounts: ['/','/opt','/var/lib/migration_toolkit']
      product_ports: []
      product_repos: []
      io_benchmark_enabled: false
  tags: preflight

- name: Discovery placeholder - migration_toolkit
  ansible.builtin.debug:
    msg: "Discovery checks for migration_toolkit not yet implemented."
  tags: discovery

- name: Check for migration toolkit packages
  ansible.builtin.shell: rpm -qa | egrep -i 'migration|migration-toolkit|mta' || true
  register: mta_pkgs
  failed_when: false
  changed_when: false
  tags: discovery

- name: Check for migration toolkit CLI or UI binaries
  ansible.builtin.shell: command -v mta || command -v mta-cli || ls /opt/migration* /usr/bin/mta* 2>/dev/null || true
  register: mta_bins
  failed_when: false
  changed_when: false
  tags: discovery

- name: Check for migration toolkit config directories
  ansible.builtin.shell: ls -d /etc/migration* /opt/migration* 2>/dev/null || true
  register: mta_dirs
  failed_when: false
  changed_when: false
  tags: discovery

- name: Combine Migration Toolkit checks into `preflight_report`
  ansible.builtin.set_fact:
    preflight_report: "{{ preflight_report | default({}) | combine({'product': 'migration_toolkit', 'migration_toolkit': { 'packages': mta_pkgs.stdout | default(''), 'binaries': mta_bins.stdout | default(''), 'dirs': mta_dirs.stdout | default('') }}) }}"
  tags: report

- name: Write migration_toolkit preflight discovery report to artifacts (json)
  ansible.builtin.copy:
    dest: "{{ artifacts_dir | default((lookup('env', 'HOME') + '/.ansible/artifacts')) }}/migration_toolkit-{{ inventory_hostname }}-preflight-report.json"
    content: "{{ preflight_report | default({}) | to_nice_json }}"
  delegate_to: localhost
  when: artifacts_dir is defined
  tags: report
