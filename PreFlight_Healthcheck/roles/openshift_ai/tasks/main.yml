---
# ansible-lint: skip_list=var-naming,jinja,yaml,risky-shell-pipe,risky-file-permissions,fqcn,key-order,name,package-latest
- name: Include env vars file (may be ansible-vault encrypted)
  ansible.builtin.include_vars:
    file: "{{ lookup('env', 'HOME') + '/.ansible/conf/env.yml' }}"
    name: env_vars
  tags: always

- name: Set product_env from env_vars
  ansible.builtin.set_fact:
    product_env: "{{ env_vars.get(product_name, {}) }}"
  tags: always

- name: Check running user is root or has passwordless sudo
  ansible.builtin.command: id -u
  register: uid_check
  changed_when: false
  failed_when: false
  tags: always

- name: Check passwordless sudo if not root
  ansible.builtin.command: sudo -n true
  register: sudo_check
  failed_when: false
  changed_when: false
  when: uid_check.stdout != "0"
  tags: always

- name: Assert running as root or with passwordless sudo (NOPASSWD)
  ansible.builtin.assert:
    that:
      - uid_check.stdout == '0' or sudo_check.rc == 0
    fail_msg: "This PreFlight healthcheck requires root or a user with passwordless sudo (NOPASSWD)."
  tags: always

- name: Assert supported RHEL major version
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] == 'RedHat'
      - ansible_facts['distribution_major_version'] is defined
      - ansible_facts['distribution_major_version'] | string in openshift_ai_supported_rhel_major_versions
    fail_msg: "This role supports RHEL major versions: {{ openshift_ai_supported_rhel_major_versions | join(', ') }}"
  tags: platform

# Detect accelerators (GPUs/accelerators)
- name: Detect accelerators (nvidia/amd or PCI accelerators)
  ansible.builtin.shell: |
    if command -v nvidia-smi >/dev/null 2>&1; then
      nvidia-smi --query-gpu=name --format=csv,noheader
    else
      lspci | egrep -i 'nvidia|amd|accelerator' || true
    fi
  register: accelerator_check
  failed_when: false
  changed_when: false
  tags: hardware

- name: Include preflight template
  ansible.builtin.include_role:
    name: preflight_template
  vars:
      product_name: openshift_ai
      product_required_mounts: ['/','/var/lib/containers','/var/lib/openshift-ai']
      product_ports: [6443,443,80]
      product_repos: []
      io_benchmark_enabled: false
  tags: preflight

- name: Discovery placeholder - openshift_ai
  ansible.builtin.debug:
    msg: "Discovery checks for openshift_ai not yet implemented."
  tags: discovery

- name: Merge accelerator detection into preflight_report
  ansible.builtin.set_fact:
    preflight_report: "{{ preflight_report | default({}) | combine({'product': 'openshift_ai', 'openshift_ai': { 'accelerators': accelerator_check.stdout | default('') }}) }}"
  tags: report

- name: Set openshift_ai discovery report
  ansible.builtin.set_fact:
    openshift_ai_discovery_report:
      inventory_hostname: "{{ inventory_hostname }}"
      accelerators: "{{ accelerator_check.stdout | default('') }}"
      preflight_template: "{{ preflight_report | default({}) }}"
  tags: report

- name: Archive openshift_ai discovery report (json)
  ansible.builtin.copy:
    dest: "{{ artifacts_dir | default((lookup('env', 'HOME') + '/.ansible/artifacts')) }}/openshift_ai-{{ inventory_hostname }}-preflight-report.json"
    content: "{{ {'product':'openshift_ai','report': openshift_ai_discovery_report | default({})} | to_nice_json }}"
  delegate_to: localhost
  when: artifacts_dir is defined
  tags: report


