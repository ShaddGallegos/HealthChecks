---
# ansible-lint: skip_list=var-naming
ceph_preflight_admin_user: admin
ceph_preflight_container_rootless: false
ceph_preflight_sudo_group: wheel
ceph_product_repos:
  - name: ceph-base
    description: Ceph repository
    baseurl: ""
ceph_product_prereq_packages:
  - python3
  - python3-venv
  - python3-pip
ceph_product_required_secrets:
  - admin_password
  - repo_baseurl
  - installer_token
ceph_product_required_mounts:
  - /var
  - /opt
ceph_installer_config_path: /etc/ceph-installer.conf
