---
# ansible-lint: skip_list=var-naming,jinja,yaml,risky-shell-pipe,risky-file-permissions,fqcn,key-order,name,package-latest
- name: Include env vars file (may be ansible-vault encrypted)
  ansible.builtin.include_vars:
    file: "{{ lookup('env', 'HOME') + '/.ansible/conf/env.yml' }}"
    name: env_vars
  ignore_errors: true
  tags: always

- name: Set product_env from env_vars
  ansible.builtin.set_fact:
    product_env: "{{ env_vars.get(product_name, {}) }}"
  tags: always

- name: Check running user is root or has passwordless sudo
  ansible.builtin.command: id -u
  register: uid_check
  changed_when: false
  failed_when: false
  tags: always

- name: Check passwordless sudo if not root
  ansible.builtin.command: sudo -n true
  register: sudo_check
  failed_when: false
  changed_when: false
  when: uid_check.stdout != "0"
  tags: always

- name: Assert running as root or with passwordless sudo (NOPASSWD)
  ansible.builtin.assert:
    that:
      - uid_check.stdout == '0' or sudo_check.rc == 0
    fail_msg: "This PreFlight healthcheck requires root or a user with passwordless sudo (NOPASSWD)."
  tags: always

- name: Assert supported RHEL major version
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] == 'RedHat'
      - ansible_facts['distribution_major_version'] is defined
      - ansible_facts['distribution_major_version'] | string in aap_supported_rhel_major_versions
    fail_msg: "This role supports RHEL major versions: {{ aap_supported_rhel_major_versions | join(', ') }}"
  tags: platform

- name: Include preflight template
  ansible.builtin.include_role:
    name: preflight_template
  vars:
    product_name: aap
    product_required_mounts: ['/','/var','/var/lib/awx','/opt/aap']
    product_ports: [80,443,5443]
    product_repos: []
    io_benchmark_enabled: false
  tags: preflight

- name: Fail if required secrets missing
  ansible.builtin.fail:
    msg: "Missing required secret '{{ item }}' for '{{ product_name }}' in ~/.ansible/conf/env.yml"
  when: product_env.get(item, '') == ''
  loop: "{{ aap_product_required_secrets | default([]) }}"
  tags: secrets

- name: Ensure prerequisite OS packages are installed
  block:
    - name: Check for missing prerequisite packages (non-destructive)
      ansible.builtin.shell: |
        if ! rpm -q {{ item }} >/dev/null 2>&1; then
          echo {{ item }}
        fi
      register: pkg_check_results
      failed_when: false
      changed_when: false
      loop: "{{ aap_product_prereq_packages }}"
      tags: prereqs

    - name: Set missing product prereq packages fact
      ansible.builtin.set_fact:
        missing_product_prereq_packages: "{{ pkg_check_results.results | map(attribute='stdout') | reject('equalto', '') | list }}"
      tags: prereqs

    - name: Install missing prerequisite packages (opt-in)
      ansible.builtin.package:
        name: "{{ missing_product_prereq_packages }}"
        state: present
      when: (aap_install_deps | default(false)) and (missing_product_prereq_packages | default([]) | length > 0)
      register: pkg_install_results
      tags: prereqs

- name: Warn about missing packages
  ansible.builtin.debug:
    msg: "Package {{ item.item }} failed to install: {{ item.msg | default('unknown') }}"
  loop: "{{ pkg_install_results.results | default([]) }}"
  when: item.failed
  tags: prereqs

- name: Ensure pip, setuptools and wheel are present
  ansible.builtin.pip:
    name:
      - pip
      - setuptools
      - wheel
    state: present
    executable: pip3
  when: aap_install_deps | default(false)
  tags: pip

- name: Ensure admin user exists
  ansible.builtin.user:
    name: "{{ aap_preflight_admin_user }}"
    groups: "{{ aap_preflight_sudo_group }}"
    append: true
    create_home: true
  when: aap_apply_changes | default(false)
  tags: users

- name: Allow admin passwordless sudo
  ansible.builtin.lineinfile:
    path: /etc/sudoers.d/preflight_admin
    create: true
    line: "{{ aap_preflight_admin_user }} ALL=(ALL) NOPASSWD:ALL"
    state: present
    validate: '/usr/sbin/visudo -cf %s'
  when: aap_apply_changes | default(false)
  tags: users

- name: Ensure product yum/dnf repositories are present
  ansible.builtin.yum_repository:
    name: "{{ item.name }}"
    description: "{{ item.description | default(item.name) }}"
    baseurl: "{{ item.baseurl }}"
    enabled: true
    gpgcheck: true
  loop: "{{ aap_product_repos | default([]) }}"
  when: (aap_product_repos is defined and aap_product_repos | length > 0) and (aap_apply_changes | default(false))
  tags: repos

- name: Ensure installer config exists (touch as placeholder)
  ansible.builtin.file:
    path: "{{ aap_installer_config_path }}"
    state: touch
  when: aap_apply_changes | default(false)
  tags: installer

- name: Configure rootless podman (subuid/subgid) when requested
  block:
    - name: Ensure subuid entry exists
      ansible.builtin.lineinfile:
        dest: /etc/subuid
        line: "{{ aap_preflight_admin_user }}:100000:65536"
        create: true
    - name: Ensure subgid entry exists
      ansible.builtin.lineinfile:
        dest: /etc/subgid
        line: "{{ aap_preflight_admin_user }}:100000:65536"
        create: true
  when: aap_preflight_container_rootless | bool and aap_apply_changes | default(false)
  tags: containers

- name: Check filesystem mounts (report)
  ansible.builtin.shell: df -h {{ item }} || true
  register: df_out
  failed_when: false
  loop: "{{ aap_product_required_mounts | default([]) }}"
  tags: filesystems

- name: Gather service facts
  ansible.builtin.service_facts:
  tags: discovery

- name: Check for common AAP commands (non-destructive)
  ansible.builtin.shell: command -v {{ item }} || true
  register: cmd_check
  failed_when: false
  changed_when: false
  loop:
    - ansible-playbook
    - ansible-runner
    - ansible-navigator
    - awx-manage
    - podman
  tags: discovery

- name: Check podman version (non-destructive)
  ansible.builtin.command: podman --version
  register: podman_check
  failed_when: false
  changed_when: false
  tags: discovery

- name: Gather installed package versions (non-destructive)
  ansible.builtin.shell: |
    if rpm -q {{ item }} >/dev/null 2>&1; then
      rpm -q --qf '%{NAME} %{VERSION}-%{RELEASE}\n' {{ item }}
    else
      echo "__not_installed__"
    fi
  register: pkg_version_results
  failed_when: false
  changed_when: false
  loop: "{{ aap_product_prereq_packages | default([]) }}"
  tags: discovery

- name: Collect listening TCP ports snapshot (non-destructive)
  ansible.builtin.shell: ss -ltnp || true
  register: ss_out
  failed_when: false
  changed_when: false
  tags: discovery

- name: Report discovery summary (debug)
  ansible.builtin.debug:
    msg:
      - "Commands checked: {{ cmd_check.results | map(attribute='item') | list }}"
      - "Command outputs: {{ cmd_check.results | map(attribute='stdout') | list }}"
      - "Podman: {{ podman_check.stdout | default('not-found') }}"
      - "Package versions: {{ pkg_version_results.results | map(attribute='stdout') | list }}"
      - "Listening snapshot lines: {{ ss_out.stdout_lines | default([]) | list }}"
  tags: discovery

- name: Set discovery report fact for AAP
  ansible.builtin.set_fact:
    aap_discovery_report:
      inventory_hostname: "{{ inventory_hostname }}"
      os: "{{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_major_version'] }}"
      selinux: "{{ ansible_facts['selinux']['status'] | default('unknown') }}"
      commands_checked: "{{ cmd_check.results | map(attribute='item') | list }}"
      command_outputs: "{{ cmd_check.results | map(attribute='stdout') | list }}"
      podman_version: "{{ podman_check.stdout | default('not-found') }}"
      package_versions: "{{ pkg_version_results.results | map(attribute='stdout') | list }}"
      listening_snapshot: "{{ ss_out.stdout_lines | default([]) | list }}"
      preflight_template: "{{ preflight_report | default({}) }}"
  tags: discovery

- name: Write AAP preflight discovery report to artifacts (json)
  ansible.builtin.copy:
    dest: "{{ artifacts_dir | default((lookup('env', 'HOME') + '/.ansible/artifacts')) }}/aap-{{ inventory_hostname }}-preflight-report.json"
    content: "{{ {'product':'aap','report': aap_discovery_report | default({})} | to_nice_json }}"
  delegate_to: localhost
  when: artifacts_dir is defined
  tags: report
