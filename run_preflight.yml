---
- hosts: localhost
  connection: local
  gather_facts: yes
  vars:
    artifacts_dir: "{{ lookup('env', 'HOME') + '/.ansible/artifacts' }}"
    products:
      - rhel
      - idm
      - gitea
      - openshift_local
  tasks:
    - name: Ensure ~/.ansible/conf/env.yml exists
      ansible.builtin.command:
        cmd: python3 HealthChecks/tools/env_manager.py --ensure
      changed_when: false

    - name: Read common admin/sudo values from env manager
      ansible.builtin.command:
        cmd: python3 HealthChecks/tools/env_manager.py --get common admin_user --get common admin_user_password --get common sudo_group --get common redhat_cdn_username --get common redhat_cdn_password
      register: preflight_common_env_cmd
      changed_when: false
      failed_when: false

    - name: Parse common env values for preflight
      ansible.builtin.set_fact:
        healthcheck_common_admin_user: "{{ ((preflight_common_env_cmd.stdout_lines | default([]) | select('search', '^common\\.admin_user=') | list | first | default('common.admin_user=')) | regex_replace('^common\\.admin_user=', '')) | default('admin') }}"
        healthcheck_common_admin_user_password: "{{ ((preflight_common_env_cmd.stdout_lines | default([]) | select('search', '^common\\.admin_user_password=') | list | first | default('common.admin_user_password=')) | regex_replace('^common\\.admin_user_password=', '')) | default('') }}"
        healthcheck_common_sudo_group: "{{ ((preflight_common_env_cmd.stdout_lines | default([]) | select('search', '^common\\.sudo_group=') | list | first | default('common.sudo_group=')) | regex_replace('^common\\.sudo_group=', '')) | default('wheel') }}"
        healthcheck_common_redhat_cdn_username: "{{ ((preflight_common_env_cmd.stdout_lines | default([]) | select('search', '^common\\.redhat_cdn_username=') | list | first | default('common.redhat_cdn_username=')) | regex_replace('^common\\.redhat_cdn_username=', '')) | default('') }}"
        healthcheck_common_redhat_cdn_password: "{{ ((preflight_common_env_cmd.stdout_lines | default([]) | select('search', '^common\\.redhat_cdn_password=') | list | first | default('common.redhat_cdn_password=')) | regex_replace('^common\\.redhat_cdn_password=', '')) | default('') }}"

    - name: Ensure artifacts dir exists
      ansible.builtin.file:
        path: "{{ artifacts_dir }}"
        state: directory
        mode: '0755'
      delegate_to: localhost

    - name: Run preflight for each product
      ansible.builtin.include_tasks: tasks/run_healthcheck_role.yml
      vars:
        healthcheck_product: "{{ role_name }}"
        healthcheck_artifacts_dir: "{{ lookup('env', 'HOME') + '/.ansible/artifacts' }}"
        healthcheck_mode_only: "{{ healthcheck_check_mode_only | default(true) | bool }}"
        healthcheck_common_admin_user: "{{ healthcheck_common_admin_user | default('admin') }}"
        healthcheck_common_admin_user_password: "{{ healthcheck_common_admin_user_password | default('') }}"
        healthcheck_common_sudo_group: "{{ healthcheck_common_sudo_group | default('wheel') }}"
        healthcheck_common_redhat_cdn_username: "{{ healthcheck_common_redhat_cdn_username | default('') }}"
        healthcheck_common_redhat_cdn_password: "{{ healthcheck_common_redhat_cdn_password | default('') }}"
      loop: "{{ products }}"
      loop_control:
        loop_var: role_name
      tags: preflight

    - name: Find preflight report files for package-gap rollup
      ansible.builtin.find:
        paths: "{{ artifacts_dir }}"
        patterns: "*-preflight-report.json"
        file_type: file
      register: preflight_rollup_files
      delegate_to: localhost
      tags: report

    - name: Read preflight report files for package-gap rollup
      ansible.builtin.slurp:
        src: "{{ item.path }}"
      loop: "{{ preflight_rollup_files.files | default([]) }}"
      register: preflight_rollup_content
      delegate_to: localhost
      when: (preflight_rollup_files.matched | default(0) | int) > 0
      tags: report

    - name: Initialize preflight package-gap rollup rows
      ansible.builtin.set_fact:
        preflight_package_gap_rollup_rows: []
      tags: report

    - name: Build preflight package-gap rollup rows
      ansible.builtin.set_fact:
        preflight_package_gap_rollup_rows: >-
          {{
            preflight_package_gap_rollup_rows + [
              {
                "product_name": (report_data.product_name | default(derived_product)),
                "inventory_hostname": (report_data.inventory_hostname | default('unknown')),
                "healthcheck_check_mode_only": (report_data.healthcheck_check_mode_only | default(true) | bool),
                "missing_package_count": (missing_packages | length),
                "missing_packages": missing_packages,
                "source_file": source_file
              }
            ]
          }}
      vars:
        report_data: "{{ item.content | b64decode | from_json }}"
        missing_packages: "{{ report_data.missing_prerequisite_packages | default([]) }}"
        source_file: "{{ item.source | basename }}"
        derived_product: "{{ source_file | regex_replace('-preflight-report\\.json$', '') }}"
      loop: "{{ preflight_rollup_content.results | default([]) }}"
      when: (missing_packages | length) > 0
      tags: report

    - name: Write unified preflight package-gap rollup JSON
      ansible.builtin.copy:
        dest: "{{ artifacts_dir }}/preflight-package-gap-rollup.json"
        content: "{{ preflight_package_gap_rollup_rows | default([]) | to_nice_json }}\n"
      delegate_to: localhost
      changed_when: false
      tags: report

    - name: Write unified preflight package-gap rollup CSV
      ansible.builtin.copy:
        dest: "{{ artifacts_dir }}/preflight-package-gap-rollup.csv"
        content: |
          product_name,inventory_hostname,healthcheck_check_mode_only,missing_package_count,missing_packages,source_file
          {% for row in preflight_package_gap_rollup_rows | default([]) %}
          {{ row.product_name }},{{ row.inventory_hostname }},{{ row.healthcheck_check_mode_only }},{{ row.missing_package_count }},"{{ (row.missing_packages | default([]) | join(';')) | replace('"', '""') }}",{{ row.source_file }}
          {% endfor %}
      delegate_to: localhost
      changed_when: false
      tags: report
