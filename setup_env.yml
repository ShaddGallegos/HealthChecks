---
- hosts: localhost
  connection: local
  gather_facts: false
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  tasks:
    - name: Ensure ~/.ansible/conf/env.yml exists (encrypted if vaultpass present)
      ansible.builtin.command:
        cmd: "{{ ansible_playbook_python }} HealthChecks/tools/env_manager.py --ensure"
      changed_when: false
