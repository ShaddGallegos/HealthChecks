---
- name: Ensure output directory exists
  ansible.builtin.file:
    path: "{{ discovery_healthcheck_output_dir }}"
    state: directory
    mode: "0755"

- name: Build run metadata
  ansible.builtin.set_fact:
    discovery_healthcheck_started_at: "{{ ansible_date_time.iso8601 }}"
    discovery_healthcheck_result:
      metadata:
        host: "{{ inventory_hostname }}"
        started_at: "{{ ansible_date_time.iso8601 }}"
        article_reference: "https://access.redhat.com/articles/4605801"
      checks:
        runtime:
          status: "unknown"
          details: {}
        connectivity:
          status: "unknown"
          details: {}
        services:
          status: "unknown"
          details: {}
