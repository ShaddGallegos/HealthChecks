---
# ansible-lint: skip_list=var-naming,jinja,yaml,risky-shell-pipe,risky-file-permissions,fqcn,key-order,name,package-latest
---
# Ceph PostInstall tuning tasks (guarded). Non-destructive unless `ceph_apply_changes` is true.

- name: Ensure prerequisite OS packages are installed
  ansible.builtin.package:
    name: "{{ item }}"
    state: present
  loop: "{{ ceph_product_prereq_packages | default([]) }}"
  when: ceph_install_deps | default(false)
  ignore_errors: "{{ postinstall_ignore_tuning_errors | default(false) }}"
  register: pkg_install_results
  tags: prereqs

- name: Ensure product yum/dnf repositories are present
  ansible.builtin.yum_repository:
    name: "{{ item.name }}"
    description: "{{ item.description | default(item.name) }}"
    baseurl: "{{ item.baseurl }}"
    enabled: true
    gpgcheck: "{{ postinstall_repo_gpgcheck | default(true) | bool }}"
  loop: "{{ ceph_product_repos | default([]) }}"
  when: ceph_product_repos is defined and ceph_product_repos | length > 0
  tags: repos

- name: Check subscription-manager status
  ansible.builtin.command: subscription-manager status
  register: subman_status
  failed_when: false
  changed_when: false
  tags: registration

- name: Register system with subscription-manager (guarded)
  ansible.builtin.command: >
    subscription-manager register --username={{ (product_env.get('subscription_username', '') if (product_env.get('subscription_username', '') != '') else (product_env.get('subscription_user', '') if (product_env.get('subscription_user', '') != '') else (product_env.get('rhsm_username', '') if (product_env.get('rhsm_username', '') != '') else (product_env.get('redhat_cdn_username', '') if (product_env.get('redhat_cdn_username', '') != '') else (healthcheck_common_redhat_cdn_username | default('')))))) }} --password={{ (product_env.get('subscription_password', '') if (product_env.get('subscription_password', '') != '') else (product_env.get('rhsm_password', '') if (product_env.get('rhsm_password', '') != '') else (product_env.get('redhat_cdn_password', '') if (product_env.get('redhat_cdn_password', '') != '') else (healthcheck_common_redhat_cdn_password | default(''))))) }} --auto-attach
  when: ((product_env.get('subscription_username','') != '') or (product_env.get('subscription_user','') != '') or (product_env.get('rhsm_username','') != '') or (product_env.get('redhat_cdn_username','') != '') or ((healthcheck_common_redhat_cdn_username | default('')) != '')) and ((product_env.get('subscription_password','') != '') or (product_env.get('rhsm_password','') != '') or (product_env.get('redhat_cdn_password','') != '') or ((healthcheck_common_redhat_cdn_password | default('')) != '')) and (ceph_apply_changes | default(false)) and not ansible_check_mode
  register: subman_register
  ignore_errors: "{{ postinstall_ignore_tuning_errors | default(false) }}"
  tags: registration

- name: Check ceph health (non-destructive)
  ansible.builtin.command: ceph -s
  register: ceph_status
  failed_when: false
  changed_when: false
  tags: discovery

- name: Gather service facts
  ansible.builtin.service_facts:
  tags: services

- name: Ensure ceph-related services are enabled and started (guarded)
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop: "{{ ceph_product_services | default([]) }}"
  when: (ceph_apply_changes | default(false)) and not ansible_check_mode
  tags: services
  ignore_errors: "{{ postinstall_ignore_tuning_errors | default(false) }}"

- name: Open required firewall ports (guarded)
  ansible.builtin.firewalld:
    port: "{{ item.port }}/tcp"
    permanent: true
    state: enabled
    immediate: true
  loop: "{{ ceph_product_ports | default([]) }}"
  when: (ceph_apply_changes | default(false)) and not ansible_check_mode
  tags: firewall
  ignore_errors: "{{ postinstall_ignore_tuning_errors | default(false) }}"

- name: Collect recent journal entries for Ceph services
  ansible.builtin.shell: journalctl -u {{ item }} -n 500 --no-pager || true
  register: service_journals
  failed_when: false
  changed_when: false
  loop: "{{ ceph_product_services | default([]) }}"
  tags: logs

- name: Write collected journals to artifacts
  ansible.builtin.copy:
    dest: "{{ artifacts_dir | default((lookup('env', 'HOME') + '/.ansible/artifacts')) }}/{{ product_name }}-{{ inventory_hostname }}-{{ item }}-journal.log"
    content: "{{ (service_journals.results[loop.index0].stdout) | default('') }}"
    owner: root
    group: root
    mode: '0644'
  loop: "{{ ceph_product_services | default([]) }}"
  when: artifacts_dir is defined
  delegate_to: localhost
  tags: logs

- name: Create Ceph postinstall tuning summary JSON
  ansible.builtin.copy:
    dest: "{{ artifacts_dir | default((lookup('env', 'HOME') + '/.ansible/artifacts')) }}/{{ product_name }}-{{ inventory_hostname }}-postinstall-tuning.json"
    content: "{{ {'product': product_name, 'ceph_status': ceph_status.stdout | default(''), 'services': ceph_product_services | default([]), 'subscription_status': subman_status.stdout | default('unknown')} | to_nice_json }}"
    owner: root
    group: root
    mode: '0644'
  delegate_to: localhost
  when: artifacts_dir is defined
  tags: report
