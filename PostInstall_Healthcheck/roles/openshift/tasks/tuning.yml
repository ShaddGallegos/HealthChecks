---
# ansible-lint: skip_list=var-naming,jinja,yaml,risky-shell-pipe,risky-file-permissions,fqcn,key-order,name,package-latest
# OpenShift PostInstall tuning tasks (guarded). Non-destructive unless `openshift_apply_changes` is true.

- name: Ensure prerequisite OS packages are installed
  ansible.builtin.package:
    name: "{{ item }}"
    state: present
  loop: "{{ openshift_product_prereq_packages | default([]) }}"
  when: openshift_install_deps | default(false)
  ignore_errors: "{{ postinstall_ignore_tuning_errors | default(false) }}"
  register: pkg_install_results
  tags: prereqs

- name: Ensure product yum/dnf repositories are present
  ansible.builtin.yum_repository:
    name: "{{ item.name }}"
    description: "{{ item.description | default(item.name) }}"
    baseurl: "{{ item.baseurl }}"
    enabled: true
    gpgcheck: "{{ postinstall_repo_gpgcheck | default(true) | bool }}"
  loop: "{{ openshift_product_repos | default([]) }}"
  when: openshift_product_repos is defined and openshift_product_repos | length > 0
  tags: repos

- name: Check subscription-manager status
  ansible.builtin.command: subscription-manager status
  register: subman_status
  failed_when: false
  changed_when: false
  tags: registration

- name: Register system with subscription-manager (guarded)
  ansible.builtin.command: >
    subscription-manager register --username={{ product_env.subscription_username }} --password={{ product_env.subscription_password }} --auto-attach
  when: (product_env.get('subscription_username','') != '') and (product_env.get('subscription_password','') != '') and (openshift_apply_changes | default(false)) and not ansible_check_mode
  register: subman_register
  ignore_errors: "{{ postinstall_ignore_tuning_errors | default(false) }}"
  tags: registration

- name: Gather service facts
  ansible.builtin.service_facts:
  tags: services

- name: Ensure product services are enabled and started (guarded)
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop: "{{ openshift_product_services | default([]) }}"
  when: (openshift_apply_changes | default(false)) and not ansible_check_mode
  tags: services
  ignore_errors: "{{ postinstall_ignore_tuning_errors | default(false) }}"

- name: Open required firewall ports (guarded)
  ansible.builtin.firewalld:
    port: "{{ item.port }}/tcp"
    permanent: true
    state: enabled
    immediate: true
  loop: "{{ openshift_product_ports | default([]) }}"
  when: (openshift_apply_changes | default(false)) and not ansible_check_mode
  tags: firewall
  ignore_errors: "{{ postinstall_ignore_tuning_errors | default(false) }}"

- name: Check SELinux state
  ansible.builtin.command: getenforce
  register: selinux_state
  changed_when: false
  failed_when: false
  tags: selinux

- name: Check OpenShift cluster operators (non-destructive)
  ansible.builtin.command: oc get co || true
  register: oc_co
  failed_when: false
  changed_when: false
  tags: discovery

- name: Check OpenShift nodes (non-destructive)
  ansible.builtin.command: oc get nodes || true
  register: oc_nodes
  failed_when: false
  changed_when: false
  tags: discovery

- name: Collect recent journal entries for product services
  ansible.builtin.shell: journalctl -u {{ item }} -n 500 --no-pager || true
  register: service_journals
  failed_when: false
  changed_when: false
  loop: "{{ openshift_product_services | default([]) }}"
  tags: logs

- name: Write collected journals to artifacts
  ansible.builtin.copy:
    dest: "{{ artifacts_dir | default((lookup('env', 'HOME') + '/.ansible/artifacts')) }}/{{ product_name }}-{{ inventory_hostname }}-{{ item }}-journal.log"
    content: "{{ (service_journals.results[loop.index0].stdout) | default('') }}"
    owner: root
    group: root
    mode: '0644'
  loop: "{{ openshift_product_services | default([]) }}"
  when: artifacts_dir is defined
  delegate_to: localhost
  tags: logs

- name: Create postinstall tuning summary JSON
  ansible.builtin.copy:
    dest: "{{ artifacts_dir | default((lookup('env', 'HOME') + '/.ansible/artifacts')) }}/{{ product_name }}-{{ inventory_hostname }}-postinstall-tuning.json"
    content: "{{ {'product': product_name, 'services': openshift_product_services | default([]), 'selinux': selinux_state.stdout | default('unknown'), 'subscription_status': subman_status.stdout | default('unknown'), 'oc_co': oc_co.stdout | default(''), 'oc_nodes': oc_nodes.stdout | default('') } | to_nice_json }}"
    owner: root
    group: root
    mode: '0644'
  delegate_to: localhost
  when: artifacts_dir is defined
  tags: report
