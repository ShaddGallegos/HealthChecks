---
apache_camel_postinstall_admin_user: \"{{ healthcheck_common_admin_user | default('admin') }}\"
apache_camel_postinstall_sudo_group: \"{{ healthcheck_common_sudo_group | default('wheel') }}\"
apache_camel_product_repos: []
apache_camel_product_prereq_packages: []
apache_camel_product_required_secrets: []
apache_camel_product_required_mounts: []
apache_camel_installer_config_path: /etc/apache_camel-installer.conf
apache_camel_product_ports: []
apache_camel_install_deps: false
apache_camel_apply_changes: false
apache_camel_supported_rhel_major_versions:
  - '8'
  - '9'
  - '10'
apache_camel_container_runtime: podman
apache_camel_container_registry: registry.redhat.io

# Per-role overrides for shared postinstall template guardrails
apache_camel_postinstall_template_preflight_binary_enforcement: "warn"
apache_camel_postinstall_template_preflight_required_binaries:
  - /bin/rpm
  - /usr/bin/dnf
apache_camel_postinstall_template_mount_free_space_enforcement: "warn"
apache_camel_postinstall_template_mount_free_space_min_ratio: 0.15
apache_camel_postinstall_template_mount_free_space_paths:
  - /
  - /var
  - /var/log
  - /var/tmp

postinstall_template_preflight_binary_enforcement: "{{ apache_camel_postinstall_template_preflight_binary_enforcement }}"
postinstall_template_preflight_required_binaries: "{{ apache_camel_postinstall_template_preflight_required_binaries }}"
postinstall_template_mount_free_space_enforcement: "{{ apache_camel_postinstall_template_mount_free_space_enforcement }}"
postinstall_template_mount_free_space_min_ratio: "{{ apache_camel_postinstall_template_mount_free_space_min_ratio }}"
postinstall_template_mount_free_space_paths: "{{ apache_camel_postinstall_template_mount_free_space_paths }}"
