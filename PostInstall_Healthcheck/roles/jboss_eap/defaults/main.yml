---
jboss_eap_postinstall_admin_user: \"{{ healthcheck_common_admin_user | default('admin') }}\"
jboss_eap_postinstall_sudo_group: \"{{ healthcheck_common_sudo_group | default('wheel') }}\"
jboss_eap_product_repos: []
jboss_eap_product_prereq_packages: []
jboss_eap_product_required_secrets: []
jboss_eap_product_required_mounts: []
jboss_eap_installer_config_path: /etc/jboss_eap-installer.conf
jboss_eap_product_ports: []
jboss_eap_install_deps: false
jboss_eap_apply_changes: false
jboss_eap_supported_rhel_major_versions:
  - '8'
  - '9'
  - '10'
jboss_eap_container_runtime: podman
jboss_eap_container_registry: registry.redhat.io

# Per-role overrides for shared postinstall template guardrails
jboss_eap_postinstall_template_preflight_binary_enforcement: "warn"
jboss_eap_postinstall_template_preflight_required_binaries:
  - /bin/rpm
  - /usr/bin/dnf
jboss_eap_postinstall_template_mount_free_space_enforcement: "warn"
jboss_eap_postinstall_template_mount_free_space_min_ratio: 0.15
jboss_eap_postinstall_template_mount_free_space_paths:
  - /
  - /var
  - /var/log
  - /var/tmp

postinstall_template_preflight_binary_enforcement: "{{ jboss_eap_postinstall_template_preflight_binary_enforcement }}"
postinstall_template_preflight_required_binaries: "{{ jboss_eap_postinstall_template_preflight_required_binaries }}"
postinstall_template_mount_free_space_enforcement: "{{ jboss_eap_postinstall_template_mount_free_space_enforcement }}"
postinstall_template_mount_free_space_min_ratio: "{{ jboss_eap_postinstall_template_mount_free_space_min_ratio }}"
postinstall_template_mount_free_space_paths: "{{ jboss_eap_postinstall_template_mount_free_space_paths }}"
