---
quarkus_postinstall_admin_user: \"{{ healthcheck_common_admin_user | default('admin') }}\"
quarkus_postinstall_sudo_group: \"{{ healthcheck_common_sudo_group | default('wheel') }}\"
quarkus_product_repos: []
quarkus_product_prereq_packages: []
quarkus_product_required_secrets: []
quarkus_product_required_mounts: []
quarkus_installer_config_path: /etc/quarkus-installer.conf
quarkus_product_ports: []
quarkus_install_deps: false
quarkus_apply_changes: false
quarkus_supported_rhel_major_versions:
  - '8'
  - '9'
  - '10'
quarkus_container_runtime: podman
quarkus_container_registry: registry.redhat.io

# Per-role overrides for shared postinstall template guardrails
quarkus_postinstall_template_preflight_binary_enforcement: "warn"
quarkus_postinstall_template_preflight_required_binaries:
  - /bin/rpm
  - /usr/bin/dnf
quarkus_postinstall_template_mount_free_space_enforcement: "warn"
quarkus_postinstall_template_mount_free_space_min_ratio: 0.15
quarkus_postinstall_template_mount_free_space_paths:
  - /
  - /var
  - /var/log
  - /var/tmp

postinstall_template_preflight_binary_enforcement: "{{ quarkus_postinstall_template_preflight_binary_enforcement }}"
postinstall_template_preflight_required_binaries: "{{ quarkus_postinstall_template_preflight_required_binaries }}"
postinstall_template_mount_free_space_enforcement: "{{ quarkus_postinstall_template_mount_free_space_enforcement }}"
postinstall_template_mount_free_space_min_ratio: "{{ quarkus_postinstall_template_mount_free_space_min_ratio }}"
postinstall_template_mount_free_space_paths: "{{ quarkus_postinstall_template_mount_free_space_paths }}"
