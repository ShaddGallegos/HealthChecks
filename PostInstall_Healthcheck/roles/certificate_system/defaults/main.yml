---
certificate_system_postinstall_admin_user: \"{{ healthcheck_common_admin_user | default('admin') }}\"
certificate_system_postinstall_sudo_group: \"{{ healthcheck_common_sudo_group | default('wheel') }}\"
certificate_system_product_repos: []
certificate_system_product_prereq_packages: []
certificate_system_product_required_secrets: []
certificate_system_product_required_mounts: []
certificate_system_installer_config_path: /etc/certificate_system-installer.conf
certificate_system_product_ports: []
certificate_system_install_deps: false
certificate_system_apply_changes: false
certificate_system_supported_rhel_major_versions:
  - '8'
  - '9'
  - '10'
certificate_system_container_runtime: podman
certificate_system_container_registry: registry.redhat.io

# Per-role overrides for shared postinstall template guardrails
certificate_system_postinstall_template_preflight_binary_enforcement: "warn"
certificate_system_postinstall_template_preflight_required_binaries:
  - /bin/rpm
  - /usr/bin/dnf
certificate_system_postinstall_template_mount_free_space_enforcement: "warn"
certificate_system_postinstall_template_mount_free_space_min_ratio: 0.15
certificate_system_postinstall_template_mount_free_space_paths:
  - /
  - /var
  - /var/log
  - /var/tmp

postinstall_template_preflight_binary_enforcement: "{{ certificate_system_postinstall_template_preflight_binary_enforcement }}"
postinstall_template_preflight_required_binaries: "{{ certificate_system_postinstall_template_preflight_required_binaries }}"
postinstall_template_mount_free_space_enforcement: "{{ certificate_system_postinstall_template_mount_free_space_enforcement }}"
postinstall_template_mount_free_space_min_ratio: "{{ certificate_system_postinstall_template_mount_free_space_min_ratio }}"
postinstall_template_mount_free_space_paths: "{{ certificate_system_postinstall_template_mount_free_space_paths }}"
