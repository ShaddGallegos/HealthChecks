---
acm_postinstall_admin_user: \"{{ healthcheck_common_admin_user | default('admin') }}\"
acm_postinstall_sudo_group: \"{{ healthcheck_common_sudo_group | default('wheel') }}\"
acm_product_repos: []
acm_product_prereq_packages: []
acm_product_required_secrets: []
acm_product_required_mounts: []
acm_installer_config_path: /etc/acm-installer.conf
acm_product_ports: []
acm_install_deps: false
acm_apply_changes: false
acm_supported_rhel_major_versions:
  - '8'
  - '9'
  - '10'
acm_container_runtime: podman
acm_container_registry: registry.redhat.io

# Per-role overrides for shared postinstall template guardrails
acm_postinstall_template_preflight_binary_enforcement: "warn"
acm_postinstall_template_preflight_required_binaries:
  - /bin/rpm
  - /usr/bin/dnf
acm_postinstall_template_mount_free_space_enforcement: "warn"
acm_postinstall_template_mount_free_space_min_ratio: 0.15
acm_postinstall_template_mount_free_space_paths:
  - /
  - /var
  - /var/log
  - /var/tmp

postinstall_template_preflight_binary_enforcement: "{{ acm_postinstall_template_preflight_binary_enforcement }}"
postinstall_template_preflight_required_binaries: "{{ acm_postinstall_template_preflight_required_binaries }}"
postinstall_template_mount_free_space_enforcement: "{{ acm_postinstall_template_mount_free_space_enforcement }}"
postinstall_template_mount_free_space_min_ratio: "{{ acm_postinstall_template_mount_free_space_min_ratio }}"
postinstall_template_mount_free_space_paths: "{{ acm_postinstall_template_mount_free_space_paths }}"
