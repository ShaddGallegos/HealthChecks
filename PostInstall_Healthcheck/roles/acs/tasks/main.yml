---
# ansible-lint: skip_list=var-naming,jinja,yaml,risky-shell-pipe,risky-file-permissions,fqcn,key-order,name,package-latest
- name: Check running user is root or has passwordless sudo
  ansible.builtin.command: id -u
  register: acs_uid_check
  changed_when: false
  failed_when: false
  tags: always

- name: Check passwordless sudo if not root
  ansible.builtin.command: sudo -n true
  register: acs_sudo_check
  failed_when: false
  changed_when: false
  when: acs_uid_check.stdout != "0"
  tags: always

- name: Assert running as root or with passwordless sudo (NOPASSWD)
  ansible.builtin.assert:
    that:
      -  acs_uid_check.stdout == '0' or acs_sudo_check.rc == 0
    fail_msg: "This PostInstall healthcheck requires root or passwordless sudo (NOPASSWD)."
  tags: always

- name: Assert supported RHEL major version
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] == 'RedHat'
      - ansible_facts['distribution_major_version'] is defined
      - ansible_facts['distribution_major_version'] | string in acs_supported_rhel_major_versions
    fail_msg: "Supported RHEL major versions: {{ acs_supported_rhel_major_versions | join(', ') }}"
  tags: platform

- name: Include postinstall template
  ansible.builtin.include_role:
    name: postinstall_template
  tags: postinstall

- name: Include guarded tuning tasks
  ansible.builtin.include_tasks: tuning.yml
  when: (acs_apply_changes | default(false)) and not ansible_check_mode
  tags: tuning

- name: PostInstall placeholder - acs
  ansible.builtin.debug:
    msg: "PostInstall tasks for acs are not yet implemented. Use acs_apply_changes to enable tuning."
  tags: postinstall

- name: Archive postinstall report (placeholder)
  ansible.builtin.copy:
    dest: "{{ artifacts_dir | default((lookup('env', 'HOME') + '/.ansible/artifacts')) }}/acs-{{ inventory_hostname }}-postinstall-report.json"
    content: "{}"
    mode: '0644'
    delegate_to: localhost
  when: artifacts_dir is defined
  tags: report
