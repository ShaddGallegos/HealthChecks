---

# Per-role overrides for shared postinstall template guardrails
rhel_ai_postinstall_template_preflight_binary_enforcement: "warn"
rhel_ai_postinstall_template_preflight_required_binaries:
  - /bin/rpm
  - /usr/bin/dnf
rhel_ai_postinstall_template_mount_free_space_enforcement: "warn"
rhel_ai_postinstall_template_mount_free_space_min_ratio: 0.15
rhel_ai_postinstall_template_mount_free_space_paths:
  - /
  - /var
  - /var/log
  - /var/tmp

postinstall_template_preflight_binary_enforcement: "{{ rhel_ai_postinstall_template_preflight_binary_enforcement }}"
postinstall_template_preflight_required_binaries: "{{ rhel_ai_postinstall_template_preflight_required_binaries }}"
postinstall_template_mount_free_space_enforcement: "{{ rhel_ai_postinstall_template_mount_free_space_enforcement }}"
postinstall_template_mount_free_space_min_ratio: "{{ rhel_ai_postinstall_template_mount_free_space_min_ratio }}"
postinstall_template_mount_free_space_paths: "{{ rhel_ai_postinstall_template_mount_free_space_paths }}"
