---
migration_toolkit_postinstall_admin_user: \"{{ healthcheck_common_admin_user | default('admin') }}\"
migration_toolkit_postinstall_sudo_group: \"{{ healthcheck_common_sudo_group | default('wheel') }}\"
migration_toolkit_product_repos: []
migration_toolkit_product_prereq_packages: []
migration_toolkit_product_required_secrets: []
migration_toolkit_product_required_mounts: []
migration_toolkit_installer_config_path: /etc/migration_toolkit-installer.conf
migration_toolkit_product_ports: []
migration_toolkit_install_deps: false
migration_toolkit_apply_changes: false
migration_toolkit_supported_rhel_major_versions:
  - '8'
  - '9'
  - '10'
migration_toolkit_container_runtime: podman
migration_toolkit_container_registry: registry.redhat.io

# Per-role overrides for shared postinstall template guardrails
migration_toolkit_postinstall_template_preflight_binary_enforcement: "warn"
migration_toolkit_postinstall_template_preflight_required_binaries:
  - /bin/rpm
  - /usr/bin/dnf
migration_toolkit_postinstall_template_mount_free_space_enforcement: "warn"
migration_toolkit_postinstall_template_mount_free_space_min_ratio: 0.15
migration_toolkit_postinstall_template_mount_free_space_paths:
  - /
  - /var
  - /var/log
  - /var/tmp

postinstall_template_preflight_binary_enforcement: "{{ migration_toolkit_postinstall_template_preflight_binary_enforcement }}"
postinstall_template_preflight_required_binaries: "{{ migration_toolkit_postinstall_template_preflight_required_binaries }}"
postinstall_template_mount_free_space_enforcement: "{{ migration_toolkit_postinstall_template_mount_free_space_enforcement }}"
postinstall_template_mount_free_space_min_ratio: "{{ migration_toolkit_postinstall_template_mount_free_space_min_ratio }}"
postinstall_template_mount_free_space_paths: "{{ migration_toolkit_postinstall_template_mount_free_space_paths }}"
