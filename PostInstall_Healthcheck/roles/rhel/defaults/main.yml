---
rhel_preflight_admin_user: \"{{ healthcheck_common_admin_user | default('admin') }}\"
rhel_preflight_container_rootless: false
rhel_preflight_sudo_group: \"{{ healthcheck_common_sudo_group | default('wheel') }}\"
rhel_product_repos:
  - name: rhel-base
    description: RHEL Base repository
    baseurl: ""
rhel_product_prereq_packages:
  - python3
  - python3-venv
  - python3-pip
rhel_product_required_secrets:
  - admin_password
  - repo_baseurl
  - installer_token
rhel_product_required_mounts:
  - /var
  - /opt
rhel_installer_config_path: /etc/rhel-installer.conf
rhel_install_deps: false
rhel_apply_changes: false

# Per-role overrides for shared postinstall template guardrails
rhel_postinstall_template_preflight_binary_enforcement: "warn"
rhel_postinstall_template_preflight_required_binaries:
  - /bin/rpm
  - /usr/bin/dnf
rhel_postinstall_template_mount_free_space_enforcement: "warn"
rhel_postinstall_template_mount_free_space_min_ratio: 0.15
rhel_postinstall_template_mount_free_space_paths:
  - /
  - /var
  - /var/log
  - /var/tmp

postinstall_template_preflight_binary_enforcement: "{{ rhel_postinstall_template_preflight_binary_enforcement }}"
postinstall_template_preflight_required_binaries: "{{ rhel_postinstall_template_preflight_required_binaries }}"
postinstall_template_mount_free_space_enforcement: "{{ rhel_postinstall_template_mount_free_space_enforcement }}"
postinstall_template_mount_free_space_min_ratio: "{{ rhel_postinstall_template_mount_free_space_min_ratio }}"
postinstall_template_mount_free_space_paths: "{{ rhel_postinstall_template_mount_free_space_paths }}"
