---
# ansible-lint: skip_list=var-naming,jinja,yaml,risky-shell-pipe,risky-file-permissions,fqcn,key-order,name,package-latest
- name: Include env vars file (may be ansible-vault encrypted)
  ansible.builtin.include_vars:
    file: "{{ lookup('env', 'HOME') + '/.ansible/conf/env.yml' }}"
    name: env_vars
  tags: always

- name: Set product_env from env_vars
  ansible.builtin.set_fact:
    rhel_product_env: "{{ env_vars.get('rhel', {}) }}"
  tags: always

- name: Check running user is root or has passwordless sudo
  ansible.builtin.command: id -u
  register: rhel_uid_check
  changed_when: false
  failed_when: false
  tags: always

- name: Check passwordless sudo if not root
  ansible.builtin.command: sudo -n true
  register: rhel_sudo_check
  failed_when: false
  changed_when: false
  when: rhel_uid_check.stdout != "0"
  tags: always

- name: Assert running as root or with passwordless sudo (NOPASSWD)
  ansible.builtin.assert:
    that:
      - rhel_uid_check.stdout == '0' or rhel_sudo_check.rc == 0
    fail_msg: "This PostInstall healthcheck requires root or a user with passwordless sudo (NOPASSWD)."
  tags: always


- name: Fail if required secrets missing
  ansible.builtin.fail:
    msg: "Missing required secret '{{ secret_key }}' for 'rhel' in ~/.ansible/conf/env.yml"
  when: rhel_product_env.get(secret_key, '') == ''
  loop: "{{ rhel_product_required_secrets | default([]) }}"
  loop_control:
    loop_var: secret_key
  tags: secrets

- name: Ensure prerequisite OS packages are installed
  ansible.builtin.package:
    name: "{{ prereq_pkg }}"
    state: present
  loop: "{{ rhel_product_prereq_packages | default([]) }}"
  loop_control:
    loop_var: prereq_pkg
  when: rhel_install_deps | default(false)
  ignore_errors: true
  register: rhel_pkg_install_results
  tags: prereqs

- name: Warn about missing packages
  ansible.builtin.debug:
    msg: "Package {{ pkg_result.item }} failed to install: {{ pkg_result.msg | default('unknown') }}"
  loop: "{{ rhel_pkg_install_results.results | default([]) }}"
  loop_control:
    loop_var: pkg_result
  when: pkg_result.failed
  tags: prereqs

- name: Ensure pip, setuptools and wheel are upgraded
  ansible.builtin.pip:
    name:
      - pip
      - setuptools
      - wheel
    state: present
    executable: pip3
  when: rhel_install_deps | default(false)
  tags: pip

- name: Ensure admin user exists
  ansible.builtin.user:
    name: "{{ rhel_preflight_admin_user }}"
    groups: "{{ rhel_preflight_sudo_group }}"
    append: true
    create_home: true
  when: rhel_apply_changes | default(false)
  tags: users

- name: Allow admin passwordless sudo
  ansible.builtin.lineinfile:
    path: /etc/sudoers.d/preflight_admin
    create: true
    line: "{{ rhel_preflight_admin_user }} ALL=(ALL) NOPASSWD:ALL"
    state: present
    mode: '0440'
    validate: '/usr/sbin/visudo -cf %s'
  when: rhel_apply_changes | default(false)
  tags: users

- name: Ensure product yum/dnf repositories are present
  ansible.builtin.yum_repository:
    name: "{{ repo_item.name }}"
    description: "{{ repo_item.description | default(repo_item.name) }}"
    baseurl: "{{ repo_item.baseurl }}"
    enabled: true
    gpgcheck: "{{ postinstall_repo_gpgcheck | default(true) | bool }}"
  loop: "{{ rhel_product_repos | default([]) }}"
  loop_control:
    loop_var: repo_item
  when: (rhel_product_repos is defined and rhel_product_repos | length > 0) and (rhel_apply_changes | default(false))
  tags: repos

- name: Ensure installer config exists (touch as placeholder)
  ansible.builtin.file:
    path: "{{ rhel_installer_config_path }}"
    state: touch
    mode: '0644'
  when: rhel_apply_changes | default(false)
  tags: installer

- name: Configure rootless podman (subuid/subgid) when requested
  block:
    - name: Ensure subuid entry exists
      ansible.builtin.lineinfile:
        dest: /etc/subuid
        line: "{{ rhel_preflight_admin_user }}:100000:65536"
        create: true
    - name: Ensure subgid entry exists
      ansible.builtin.lineinfile:
        dest: /etc/subgid
        line: "{{ rhel_preflight_admin_user }}:100000:65536"
        create: true
  when: rhel_preflight_container_rootless | bool
  tags: containers

- name: Check filesystem mounts (report)
  ansible.builtin.shell: df -h {{ mount_point }} || true
  register: rhel_df_out
  failed_when: false
  loop: "{{ rhel_product_required_mounts | default([]) }}"
  loop_control:
    loop_var: mount_point
  tags: filesystems

- name: Include shared postinstall OS evidence checks
  ansible.builtin.include_role:
    name: postinstall_template
  tags: postinstall
