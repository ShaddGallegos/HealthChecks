---
# ansible-lint: skip_list=var-naming,jinja,yaml,risky-shell-pipe,risky-file-permissions,fqcn,key-order,name,package-latest
# Tuning and change tasks for AAP role
# These tasks modify system state and are included only when `aap_apply_changes: true`.

- name: Ensure prerequisite OS packages are installed
  ansible.builtin.package:
    name: "{{ item }}"
    state: present
  loop: "{{ aap_product_prereq_packages | default([]) }}"
  when: aap_install_deps | default(false)
  ignore_errors: "{{ postinstall_ignore_tuning_errors | default(false) }}"
  register: aap_pkg_install_results
  tags: prereqs

- name: Warn about missing packages
  ansible.builtin.debug:
    msg: "Package {{ item.item }} failed to install: {{ item.msg | default('unknown') }}"
  loop: "{{ aap_pkg_install_results.results | default([]) }}"
  when: item.failed
  tags: prereqs

- name: Ensure pip, setuptools and wheel are upgraded
  ansible.builtin.pip:
    name:
      - pip
      - setuptools
      - wheel
    state: present
    executable: pip3
  when: aap_install_deps | default(false)
  tags: pip

- name: Ensure admin user exists
  ansible.builtin.user:
    name: "{{ aap_preflight_admin_user }}"
    groups: "{{ aap_preflight_sudo_group }}"
    append: true
    create_home: true
  tags: users

- name: Allow admin passwordless sudo
  ansible.builtin.lineinfile:
    path: /etc/sudoers.d/preflight_admin
    create: true
    line: "{{ aap_preflight_admin_user }} ALL=(ALL) NOPASSWD:ALL"
    state: present
    mode: '0440'
    validate: '/usr/sbin/visudo -cf %s'
  tags: users

- name: Ensure product yum/dnf repositories are present
  ansible.builtin.yum_repository:
    name: "{{ item.name }}"
    description: "{{ item.description | default(item.name) }}"
    baseurl: "{{ item.baseurl }}"
    enabled: true
    gpgcheck: "{{ postinstall_repo_gpgcheck | default(true) | bool }}"
  loop: "{{ aap_product_repos | default([]) }}"
  when: aap_product_repos is defined and aap_product_repos | length > 0
  tags: repos

- name: Ensure installer config exists (touch as placeholder)
  ansible.builtin.file:
    path: "{{ aap_installer_config_path }}"
    state: touch
    mode: '0644'
  tags: installer

- name: Configure rootless podman (subuid/subgid) when requested
  when: aap_preflight_container_rootless | bool
  tags: containers
  block:
    - name: Ensure subuid entry exists
      ansible.builtin.lineinfile:
        dest: /etc/subuid
        line: "{{ aap_preflight_admin_user }}:100000:65536"
        create: true
        mode: '0644'
    - name: Ensure subgid entry exists
      ansible.builtin.lineinfile:
        dest: /etc/subgid
        line: "{{ aap_preflight_admin_user }}:100000:65536"
        create: true
        mode: '0644'

# --- Postinstall tuning/discovery tasks (non-destructive unless guarded by aap_apply_changes) ---

- name: Check subscription-manager status
  ansible.builtin.command: subscription-manager status
  register: aap_subman_status
  failed_when: false
  changed_when: false
  tags: registration

- name: Register system with subscription-manager (guarded)
  ansible.builtin.command: >
    subscription-manager register --username={{ aap_product_env.subscription_username if (aap_product_env.get('subscription_username', '') != '') else (healthcheck_common_redhat_cdn_username | default('')) }} --password={{ aap_product_env.subscription_password if (aap_product_env.get('subscription_password', '') != '') else (healthcheck_common_redhat_cdn_password | default('')) }} --auto-attach
  when:
    - (aap_product_env.get('subscription_username', '') != '') or ((healthcheck_common_redhat_cdn_username | default('')) != '')
    - (aap_product_env.get('subscription_password', '') != '') or ((healthcheck_common_redhat_cdn_password | default('')) != '')
    - aap_apply_changes | default(false)
    - not ansible_check_mode
  register: aap_subman_register
  failed_when: false
  changed_when: false
  tags: registration

# Service discovery and guarded enable/start
- name: Gather service facts
  ansible.builtin.service_facts:
  tags: services

- name: Report desired product services
  ansible.builtin.debug:
    msg: "Desired services for {{ product_name }}: {{ aap_product_services | default([]) }}"
  tags: services

- name: Ensure product services are enabled and started (guarded)
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop: "{{ aap_product_services | default([]) }}"
  when: (aap_apply_changes | default(false)) and not ansible_check_mode
  tags: services
  failed_when: false

# Firewall handling (guarded)
- name: Open required firewall ports (guarded)
  ansible.posix.firewalld:
    port: "{{ item.port }}/tcp"
    permanent: true
    state: enabled
    immediate: true
  loop: "{{ aap_product_ports | default([]) }}"
  when: (aap_apply_changes | default(false)) and not ansible_check_mode
  tags: firewall
  failed_when: false

# SELinux check and optional enforcement
- name: Check SELinux state
  ansible.builtin.command: getenforce
  register: aap_selinux_state
  changed_when: false
  failed_when: false
  tags: selinux

- name: Set SELinux to Enforcing (guarded)
  ansible.builtin.command: setenforce Enforcing
  when: aap_product_env.get('set_selinux_enforcing','') | default(false) and (aap_apply_changes | default(false)) and not ansible_check_mode
  tags: selinux
  failed_when: false
  changed_when: false

# HTTP/endpoint checks
- name: Check HTTP endpoints for product ports
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ item.port }}/"
    status_code: 200
    return_content: false
  register: aap_http_endpoint_check
  failed_when: false
  when: item.port is defined
  loop: "{{ aap_product_ports | default([]) }}"
  tags: discovery

# Collect recent logs for product services
- name: Collect recent journal entries for product services
  ansible.builtin.shell: journalctl -u {{ item }} -n 500 --no-pager || true
  register: aap_service_journals
  failed_when: false
  changed_when: false
  loop: "{{ aap_product_services | default([]) }}"
  tags: logs

- name: Write collected journals to artifacts
  ansible.builtin.copy:
    dest: "{{ artifacts_dir | default((lookup('env', 'HOME') + '/.ansible/artifacts')) }}/{{ product_name }}-{{ inventory_hostname }}-{{ item }}-journal.log"
    content: "{{ (aap_service_journals.results[loop.index0].stdout) | default('') }}"
    owner: root
    group: root
    mode: '0644'
  loop: "{{ aap_product_services | default([]) }}"
  when: artifacts_dir is defined
  delegate_to: localhost
  tags: logs

# Emit a small JSON artifact summary for aggregator
- name: Create postinstall tuning summary JSON
  ansible.builtin.copy:
    dest: "{{ artifacts_dir | default((lookup('env', 'HOME') + '/.ansible/artifacts')) }}/{{ product_name }}-{{ inventory_hostname }}-postinstall-tuning.json"
    content: "{{ {'product': product_name, 'services': aap_product_services | default([]), 'selinux': aap_selinux_state.stdout | default('unknown'), 'subscription_status': aap_subman_status.stdout | default('unknown'), 'http_checks': (aap_http_endpoint_check.results | default([]) | map(attribute='status') | list) } | to_nice_json }}"
    owner: root
    group: root
    mode: '0644'
  delegate_to: localhost
  when: artifacts_dir is defined
  tags: report
