---
three_scale_postinstall_admin_user: \"{{ healthcheck_common_admin_user | default('admin') }}\"
three_scale_postinstall_sudo_group: \"{{ healthcheck_common_sudo_group | default('wheel') }}\"
three_scale_product_repos: []
three_scale_product_prereq_packages: []
three_scale_product_required_secrets: []
three_scale_product_required_mounts: []
three_scale_installer_config_path: /etc/three_scale-installer.conf
three_scale_product_ports: []
three_scale_install_deps: false
three_scale_apply_changes: false
three_scale_supported_rhel_major_versions:
  - '8'
  - '9'
  - '10'
three_scale_container_runtime: podman
three_scale_container_registry: registry.redhat.io

# Per-role overrides for shared postinstall template guardrails
three_scale_postinstall_template_preflight_binary_enforcement: "warn"
three_scale_postinstall_template_preflight_required_binaries:
  - /bin/rpm
  - /usr/bin/dnf
three_scale_postinstall_template_mount_free_space_enforcement: "warn"
three_scale_postinstall_template_mount_free_space_min_ratio: 0.15
three_scale_postinstall_template_mount_free_space_paths:
  - /
  - /var
  - /var/log
  - /var/tmp

postinstall_template_preflight_binary_enforcement: "{{ three_scale_postinstall_template_preflight_binary_enforcement }}"
postinstall_template_preflight_required_binaries: "{{ three_scale_postinstall_template_preflight_required_binaries }}"
postinstall_template_mount_free_space_enforcement: "{{ three_scale_postinstall_template_mount_free_space_enforcement }}"
postinstall_template_mount_free_space_min_ratio: "{{ three_scale_postinstall_template_mount_free_space_min_ratio }}"
postinstall_template_mount_free_space_paths: "{{ three_scale_postinstall_template_mount_free_space_paths }}"
