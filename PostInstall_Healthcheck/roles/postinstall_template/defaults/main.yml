---
# Shared preflight enforcement for PostInstall template role.
# Allowed values: warn, fail
postinstall_template_preflight_binary_enforcement: "warn"

# Host binary paths expected on RHEL-family systems.
postinstall_template_preflight_required_binaries:
  - /bin/rpm
  - /usr/bin/dnf

# Shared mount free-space threshold checks.
# Allowed values: warn, fail
postinstall_template_mount_free_space_enforcement: "warn"
postinstall_template_mount_free_space_min_ratio: 0.15
postinstall_template_mount_free_space_paths:
  - /
  - /var
  - /var/log
  - /var/tmp

# /boot is checked by absolute minimum free MB while other paths use percentage.
postinstall_template_boot_min_free_mb: 2048

# Product-specific mount profiles (used when product_name is available).
# Keep /boot out of ratio paths because it has an absolute MB guardrail.
postinstall_template_mount_free_space_paths_by_product:
  aap:
    - /
    - /var
    - /var/lib/awx
    - /var/lib/pulp
    - /var/lib/pgsql
    - /var/lib/redis
  aap_eda:
