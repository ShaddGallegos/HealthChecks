---
application_foundations_postinstall_admin_user: \"{{ healthcheck_common_admin_user | default('admin') }}\"
application_foundations_postinstall_sudo_group: \"{{ healthcheck_common_sudo_group | default('wheel') }}\"
application_foundations_product_repos: []
application_foundations_product_prereq_packages: []
application_foundations_product_required_secrets: []
application_foundations_product_required_mounts: []
application_foundations_installer_config_path: /etc/application_foundations-installer.conf
application_foundations_product_ports: []
application_foundations_install_deps: false
application_foundations_apply_changes: false
application_foundations_supported_rhel_major_versions:
  - '8'
  - '9'
  - '10'
application_foundations_container_runtime: podman
application_foundations_container_registry: registry.redhat.io

# Per-role overrides for shared postinstall template guardrails
application_foundations_postinstall_template_preflight_binary_enforcement: "warn"
application_foundations_postinstall_template_preflight_required_binaries:
  - /bin/rpm
  - /usr/bin/dnf
application_foundations_postinstall_template_mount_free_space_enforcement: "warn"
application_foundations_postinstall_template_mount_free_space_min_ratio: 0.15
application_foundations_postinstall_template_mount_free_space_paths:
  - /
  - /var
  - /var/log
  - /var/tmp

postinstall_template_preflight_binary_enforcement: "{{ application_foundations_postinstall_template_preflight_binary_enforcement }}"
postinstall_template_preflight_required_binaries: "{{ application_foundations_postinstall_template_preflight_required_binaries }}"
postinstall_template_mount_free_space_enforcement: "{{ application_foundations_postinstall_template_mount_free_space_enforcement }}"
postinstall_template_mount_free_space_min_ratio: "{{ application_foundations_postinstall_template_mount_free_space_min_ratio }}"
postinstall_template_mount_free_space_paths: "{{ application_foundations_postinstall_template_mount_free_space_paths }}"
