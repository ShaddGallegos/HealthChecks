---
ai_inference_postinstall_admin_user: \"{{ healthcheck_common_admin_user | default('admin') }}\"
ai_inference_postinstall_sudo_group: \"{{ healthcheck_common_sudo_group | default('wheel') }}\"
ai_inference_product_repos: []
ai_inference_product_prereq_packages: []
ai_inference_product_required_secrets: []
ai_inference_product_required_mounts: []
ai_inference_installer_config_path: /etc/ai_inference-installer.conf
ai_inference_product_ports: []
ai_inference_install_deps: false
ai_inference_apply_changes: false
ai_inference_supported_rhel_major_versions:
  - '8'
  - '9'
  - '10'
ai_inference_container_runtime: podman
ai_inference_container_registry: registry.redhat.io

# Per-role overrides for shared postinstall template guardrails
ai_inference_postinstall_template_preflight_binary_enforcement: "warn"
ai_inference_postinstall_template_preflight_required_binaries:
  - /bin/rpm
  - /usr/bin/dnf
ai_inference_postinstall_template_mount_free_space_enforcement: "warn"
ai_inference_postinstall_template_mount_free_space_min_ratio: 0.15
ai_inference_postinstall_template_mount_free_space_paths:
  - /
  - /var
  - /var/log
  - /var/tmp

postinstall_template_preflight_binary_enforcement: "{{ ai_inference_postinstall_template_preflight_binary_enforcement }}"
postinstall_template_preflight_required_binaries: "{{ ai_inference_postinstall_template_preflight_required_binaries }}"
postinstall_template_mount_free_space_enforcement: "{{ ai_inference_postinstall_template_mount_free_space_enforcement }}"
postinstall_template_mount_free_space_min_ratio: "{{ ai_inference_postinstall_template_mount_free_space_min_ratio }}"
postinstall_template_mount_free_space_paths: "{{ ai_inference_postinstall_template_mount_free_space_paths }}"
