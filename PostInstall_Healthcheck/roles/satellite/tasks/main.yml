---
# ansible-lint: skip_list=var-naming,jinja,yaml,risky-shell-pipe,risky-file-permissions,fqcn,key-order,name,package-latest
- name: Include env vars file (may be ansible-vault encrypted)
  ansible.builtin.include_vars:
    file: "{{ lookup('env', 'HOME') + '/.ansible/conf/env.yml' }}"
    name: env_vars
  tags: always

- name: Set product_env from env_vars
  ansible.builtin.set_fact:
    satellite_product_env: "{{ env_vars.get('satellite', {}) }}"
  tags: always

- name: Fail if required secrets missing
  ansible.builtin.fail:
    msg: "Missing required secret '{{ item }}' for 'satellite' in ~/.ansible/conf/env.yml"
  when: satellite_product_env.get(item, '') == ''
  loop: "{{ satellite_product_required_secrets | default([]) }}"
  tags: secrets

- name: Ensure prerequisite OS packages are installed
  ansible.builtin.package:
    name: "{{ item }}"
    state: present
  loop: "{{ satellite_product_prereq_packages | default([]) }}"
  ignore_errors: true
  register: satellite_pkg_install_results
  tags: prereqs

- name: Warn about missing packages
  ansible.builtin.debug:
    msg: "Package {{ item.item }} failed to install: {{ item.msg | default('unknown') }}"
  loop: "{{ satellite_pkg_install_results.results | default([]) }}"
  when: item.failed
  tags: prereqs

- name: Ensure pip, setuptools and wheel are upgraded
  ansible.builtin.pip:
    name:
      - pip
      - setuptools
      - wheel
    state: present
    executable: pip3
  when: satellite_install_deps | default(false)
  tags: pip

- name: Ensure admin user exists
  ansible.builtin.user:
    name: "{{ satellite_preflight_admin_user }}"
    groups: "{{ satellite_preflight_sudo_group }}"
    append: true
    create_home: true
  when: satellite_apply_changes | default(false)
  tags: users

- name: Allow admin passwordless sudo
  ansible.builtin.lineinfile:
    path: /etc/sudoers.d/preflight_admin
    create: true
    line: "{{ satellite_preflight_admin_user }} ALL=(ALL) NOPASSWD:ALL"
    state: present
    mode: '0440'
    validate: '/usr/sbin/visudo -cf %s'
  when: satellite_apply_changes | default(false)
  tags: users

- name: Ensure product yum/dnf repositories are present
  ansible.builtin.yum_repository:
    name: "{{ item.name }}"
    description: "{{ item.description | default(item.name) }}"
    baseurl: "{{ item.baseurl }}"
    enabled: true
    gpgcheck: "{{ postinstall_repo_gpgcheck | default(true) | bool }}"
  loop: "{{ satellite_product_repos | default([]) }}"
  when: (satellite_product_repos is defined and satellite_product_repos | length > 0) and (satellite_apply_changes | default(false))
  tags: repos

- name: Ensure installer config exists (touch as placeholder)
  ansible.builtin.file:
    path: "{{ satellite_installer_config_path }}"
    state: touch
    mode: '0644'
  when: satellite_apply_changes | default(false)
  tags: installer

# Enforce RHEL-only environment policy early in role execution
- name: Assert running on supported RHEL major version
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] == 'RedHat'
      - ansible_facts['distribution_major_version'] is defined
      - ansible_facts['distribution_major_version'] | string in satellite_supported_rhel_major_versions
    fail_msg: "This role only supports RHEL major versions: {{ satellite_supported_rhel_major_versions | join(', ') }}"
  tags: platform

# Include tuning tasks only when satellite_apply_changes and specific toggles are enabled
- name: Include tuning tasks when destructive changes are allowed
  ansible.builtin.include_tasks:
    file: tuning.yml
  when: (satellite_apply_changes | default(false)) and not ansible_check_mode
  tags: tuning

- name: Optionally export Satellite hosts via REST API
  ansible.builtin.include_tasks:
    file: satellite_hosts_export.yml
  when: satellite_hosts_export_enabled | default(false)
  tags:
    - satellite_hosts_export
    - api
