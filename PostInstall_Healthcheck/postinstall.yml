---
- hosts: all
  gather_facts: true
  become: true
  vars:
    product_name: rhel
    postinstall_artifacts_dir: "{{ lookup('env', 'HOME') + '/.ansible/artifacts/postinstall' }}"
    artifacts_dir_effective: "{{ postinstall_artifacts_dir }}"
  pre_tasks:
    - name: Set healthcheck safety mode
      ansible.builtin.set_fact:
        healthcheck_check_mode_only_effective: "{{ healthcheck_check_mode_only | default(true) | bool }}"

    - name: Set effective execution flags for selected postinstall product
      ansible.builtin.set_fact:
        install_deps: "{{ not healthcheck_check_mode_only_effective }}"
        apply_changes: "{{ not healthcheck_check_mode_only_effective }}"
        "{{ product_name }}_install_deps": "{{ not healthcheck_check_mode_only_effective }}"
        "{{ product_name }}_apply_changes": "{{ not healthcheck_check_mode_only_effective }}"

    - name: Ensure artifacts dir exists on controller
      file:
        path: "{{ artifacts_dir_effective }}"
        state: directory
        mode: '0755'
      delegate_to: localhost

  roles:
    - role: roles/postinstall_template
      vars:
        artifacts_dir: "{{ artifacts_dir_effective }}"
    - role: "roles/{{ product_name }}"
      vars:
        artifacts_dir: "{{ artifacts_dir_effective }}"
